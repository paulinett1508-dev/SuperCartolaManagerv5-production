<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raio-X Analytics - Super Cartola Manager</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/_admin-tokens.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/modules/dashboard-redesign.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/modules/super-modal.css" />
    <script src="js/super-modal.js"></script>
    <link rel="stylesheet" href="css/modules/admin-analises-ia.css" />
</head>
<body>
    <div id="sidebar-placeholder"></div>
    <main class="app-main admin-page">
    <div class="admin-content">
        <!-- Header -->
        <div class="admin-header">
            <h1>
                <span class="material-icons">insights</span>
                Raio-X Analytics
            </h1>
            <p>Análises internas dos dados do sistema — instantâneo e gratuito</p>
        </div>

        <!-- Seletores -->
        <div class="rx-selectors">
            <div class="form-group">
                <label for="selectLiga">Liga</label>
                <select id="selectLiga">
                    <option value="">Carregando ligas...</option>
                </select>
            </div>
        </div>

        <!-- Grid de Análises -->
        <div class="rx-grid">
            <button class="rx-card" data-tipo="visao-geral" data-requer-liga="false">
                <span class="material-icons rx-card-icon">dashboard</span>
                <div class="rx-card-title">Visão Geral</div>
                <div class="rx-card-desc">KPIs globais: ligas, participantes, volume financeiro</div>
            </button>
            <button class="rx-card" data-tipo="raio-x-financeiro" data-requer-liga="true">
                <span class="material-icons rx-card-icon">account_balance</span>
                <div class="rx-card-title">Raio-X Financeiro</div>
                <div class="rx-card-desc">Saldos, devedores, credores, pagamentos</div>
            </button>
            <button class="rx-card" data-tipo="saude-liga" data-requer-liga="true">
                <span class="material-icons rx-card-icon">favorite</span>
                <div class="rx-card-title">Saúde da Liga</div>
                <div class="rx-card-desc">Ativos, desistentes, módulos, engajamento</div>
            </button>
            <button class="rx-card" data-tipo="performance" data-requer-liga="true">
                <span class="material-icons rx-card-icon">emoji_events</span>
                <div class="rx-card-title">Performance</div>
                <div class="rx-card-desc">Ranking, consistência, mitos e micos</div>
            </button>
            <button class="rx-card" data-tipo="diagnostico" data-requer-liga="false">
                <span class="material-icons rx-card-icon">monitor_heart</span>
                <div class="rx-card-title">Diagnóstico</div>
                <div class="rx-card-desc">Health score, banco, memória, consolidação</div>
            </button>
        </div>

        <!-- Loading -->
        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); margin-top: 16px;">Processando análise...</p>
        </div>

        <!-- Resultado -->
        <div id="resultadoContainer"></div>
    </div>
    </main>

    <script src="js/admin-shell.js"></script>
    <script src="js/admin/modules/admin-analises-ia.js" type="module"></script>
</body>
</html>
