<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Super Cartola Manager</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/_admin-tokens.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/modules/super-modal.css" />
    <script src="js/super-modal.js"></script>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: var(--font-family-base, 'Inter', sans-serif);
        background: var(--surface-bg, #0a0a0a);
        min-height: 100vh;
        display: flex;
        align-items: stretch;
        color: var(--text-primary, #fff);
    }

    /* ── HERO (esquerda) ── */
    .hero {
        width: 240px;
        flex-shrink: 0;
        background: var(--surface-card, #1e1e1e);
        border-right: 1px solid var(--border-subtle, #2a2a2a);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 40px 24px;
        position: relative;
        overflow: hidden;
    }
    .hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: var(--color-primary, #ff4500);
        opacity: 0.06;
        pointer-events: none;
    }
    .hero-icon {
        width: 72px; height: 72px;
        border-radius: var(--radius-xl, 18px);
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border-default, #333);
        display: flex; align-items: center; justify-content: center;
    }
    .hero-icon .material-icons {
        font-size: 36px;
        color: var(--color-primary, #ff4500);
    }
    .hero-name {
        font-family: var(--font-family-brand, 'Russo One', sans-serif);
        font-size: 14px;
        color: var(--text-primary, #fff);
        text-align: center;
        line-height: 1.3;
    }
    .hero-label {
        font-size: 10px;
        color: var(--text-muted, rgba(255,255,255,0.35));
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }

    /* ── FORM (direita) ── */
    .form-side {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        background: var(--surface-bg, #0a0a0a);
    }
    .form-container {
        width: 100%;
        max-width: 360px;
    }
    .form-title {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-primary, #fff);
        margin-bottom: 4px;
    }
    .form-subtitle {
        color: var(--text-muted, rgba(255,255,255,0.4));
        font-size: 13px;
        margin-bottom: 28px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
        display: block;
        color: var(--text-secondary, rgba(255,255,255,0.6));
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 6px;
    }
    .form-group input {
        width: 100%;
        padding: 12px 14px;
        background: var(--surface-card, #1e1e1e);
        border: 1px solid var(--border-subtle, #2a2a2a);
        border-radius: var(--radius-md, 8px);
        color: var(--text-primary, #fff);
        font-size: 14px;
        transition: border-color var(--transition-fast, 0.15s ease);
        font-family: var(--font-family-base, 'Inter', sans-serif);
    }
    .form-group input:focus {
        border-color: var(--color-primary, #ff4500);
        outline: none;
        box-shadow: 0 0 0 3px rgba(255,69,0,0.15);
    }
    .form-group input::placeholder {
        color: var(--text-disabled, rgba(255,255,255,0.2));
    }
    .btn-login {
        width: 100%;
        padding: 13px 20px;
        background: var(--color-primary, #ff4500);
        border: none;
        border-radius: var(--radius-md, 8px);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        transition: box-shadow var(--transition-fast, 0.15s ease), opacity var(--transition-fast, 0.15s ease);
        font-family: var(--font-family-base, 'Inter', sans-serif);
        margin-bottom: 14px;
    }
    .btn-login:hover { box-shadow: 0 4px 16px rgba(255,69,0,0.35); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-login .material-icons { font-size: 18px; }

    .divider {
        display: flex; align-items: center; gap: 12px;
        margin: 18px 0;
        color: var(--text-muted, rgba(255,255,255,0.25));
        font-size: 12px;
    }
    .divider::before, .divider::after {
        content: ''; flex: 1;
        height: 1px;
        background: var(--border-subtle, #222);
    }
    .btn-google {
        width: 100%;
        padding: 12px 20px;
        background: var(--surface-card, #1e1e1e);
        border: 1px solid var(--border-subtle, #2a2a2a);
        border-radius: var(--radius-md, 8px);
        color: var(--text-secondary, rgba(255,255,255,0.6));
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        transition: border-color var(--transition-fast, 0.15s ease);
        text-decoration: none;
        font-family: var(--font-family-base, 'Inter', sans-serif);
    }
    .btn-google:hover { border-color: var(--border-default, #444); }

    .error-message {
        background: var(--color-danger-muted, rgba(239,68,68,0.1));
        border: 1px solid var(--color-danger, rgba(239,68,68,0.3));
        color: var(--color-danger, #ef4444);
        padding: 10px 14px;
        border-radius: var(--radius-md, 8px);
        margin-bottom: 16px;
        font-size: 13px;
        display: none;
    }
    .error-message.show { display: block; }
    .success-message {
        background: var(--color-success-muted, rgba(34,197,94,0.1));
        border: 1px solid var(--color-success, rgba(34,197,94,0.3));
        color: var(--color-success, #22c55e);
        padding: 10px 14px;
        border-radius: var(--radius-md, 8px);
        margin-bottom: 16px;
        font-size: 13px;
        display: none;
    }
    .success-message.show { display: block; }

    /* ── Modal trocar senha (preservado) ── */
    .modal {
        display: none; position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.85);
        align-items: center; justify-content: center;
        z-index: 9999;
    }
    .modal.show { display: flex; }
    .modal-content {
        background: var(--surface-card, #1a1a1a);
        border-radius: var(--radius-lg, 12px);
        padding: 24px;
        max-width: 400px; width: 90%;
        border: 2px solid var(--color-warning, #f59e0b);
    }
    .modal-content h3 {
        color: var(--color-warning, #f59e0b);
        margin: 0 0 16px;
        display: flex; align-items: center; gap: 8px;
    }
    .modal-content p {
        color: var(--text-muted, #9ca3af);
        margin: 0 0 20px;
        font-size: 13px;
    }

    /* ── Mobile: hero some, single column ── */
    @media (max-width: 768px) {
        body { flex-direction: column; }
        .hero { display: none; }
        .form-side { padding: 40px 24px; align-items: flex-start; }
    }
</style>
</head>
<body>
    <!-- HERO -->
    <aside class="hero">
        <div class="hero-icon">
            <span class="material-icons">admin_panel_settings</span>
        </div>
        <div class="hero-name">Super Cartola<br>Manager</div>
        <div class="hero-label">Admin Panel</div>
    </aside>

    <!-- FORM -->
    <main class="form-side">
        <div class="form-container">
            <h1 class="form-title">Entrar</h1>
            <p class="form-subtitle">Acesse o painel de gestão da sua liga</p>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email"
                           placeholder="seu@email.com" autocomplete="email" required />
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha"
                           placeholder="Sua senha" autocomplete="current-password" required />
                </div>
                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="material-icons">login</span>
                    Entrar
                </button>
            </form>

            <div class="divider">ou</div>

            <a href="/api/admin/auth/login" class="btn-google">
                <span class="material-icons">login</span>
                Entrar com Google
            </a>
        </div>
    </main>

    <!-- Modal Trocar Senha (preservado intacto) -->
    <div class="modal" id="modalTrocarSenha">
        <div class="modal-content">
            <h3>
                <span class="material-icons">warning</span>
                Troque sua Senha
            </h3>
            <p>Voce esta usando uma senha provisoria. Por seguranca, defina uma nova senha.</p>
            <form id="formTrocarSenha">
                <div class="form-group">
                    <label for="novaSenha">Nova Senha (minimo 6 caracteres)</label>
                    <input type="password" id="novaSenha" name="novaSenha"
                           placeholder="Digite nova senha" autocomplete="new-password" minlength="6" required />
                </div>
                <div class="form-group">
                    <label for="confirmarSenha">Confirmar Nova Senha</label>
                    <input type="password" id="confirmarSenha" name="confirmarSenha"
                           placeholder="Confirme a senha" autocomplete="new-password" minlength="6" required />
                </div>
                <button type="submit" class="btn-login">
                    <span class="material-icons">lock</span>
                    Definir Nova Senha
                </button>
            </form>
        </div>
    </div>

    <script>
        if (!window.__admin_login_state) {
            window.__admin_login_state = { bound: false };
        }

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const btnLogin = document.getElementById('btnLogin');

        if (!window.__admin_login_state.bound) {
            window.__admin_login_state.bound = true;
            loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            if (!email || !senha) {
                mostrarErro('Preencha email e senha');
                return;
            }

            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="material-icons">sync</span> Entrando...';
            errorMessage.classList.remove('show');

            try {
                const response = await fetch('/api/admin/cliente/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                let data;
                try {
                    data = await response.json();
                } catch (parseError) {
                    console.error('Erro ao parsear resposta:', parseError);
                    throw new Error('Erro de comunicacao com o servidor. Tente novamente.');
                }

                if (!data.success) {
                    throw new Error(data.message || 'Erro desconhecido');
                }

                // Verificar se precisa trocar senha
                if (data.senhaProvisoria) {
                    document.getElementById('modalTrocarSenha').classList.add('show');
                    return;
                }

                // Login bem sucedido
                mostrarSucesso('Login realizado! Redirecionando...');
                setTimeout(() => {
                    window.location.href = '/painel.html';
                }, 1000);

            } catch (error) {
                mostrarErro(error.message);
            } finally {
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<span class="material-icons">login</span> Entrar';
            }
            });

        // Trocar senha
        document.getElementById('formTrocarSenha').addEventListener('submit', async (e) => {
            e.preventDefault();

            const novaSenha = document.getElementById('novaSenha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;

            if (novaSenha !== confirmarSenha) {
                SuperModal.toast.warning('As senhas nao coincidem');
                return;
            }

            if (novaSenha.length < 6) {
                SuperModal.toast.warning('A senha deve ter pelo menos 6 caracteres');
                return;
            }

            try {
                const response = await fetch('/api/admin/cliente/trocar-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ novaSenha })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message);
                }

                SuperModal.toast.success('Senha alterada com sucesso!');
                document.getElementById('modalTrocarSenha').classList.remove('show');
                window.location.href = '/painel.html';

            } catch (error) {
                SuperModal.toast.error('Erro: ' + error.message);
            }
            });
        }

        function mostrarErro(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }

        function mostrarSucesso(msg) {
            successMessage.textContent = msg;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }
    </script>
</body>
</html>
