<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Gerenciar Módulos - Super Cartola Manager</title>
        <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
        <!-- Design Tokens (SEMPRE PRIMEIRO) -->
        <link rel="stylesheet" href="css/_admin-tokens.css" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="css/modules/dashboard-redesign.css" />
        <link rel="stylesheet" href="css/modules/gerenciar.css" />
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
        <!-- Bootstrap 5.3 (necessário para modais) -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <!-- jsPDF para exportação PDF -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    </head>
    <body>
        <div class="app-container">
            <div id="sidebar-placeholder"></div>

            <main class="app-main modulos-page">
                <div class="modulos-content">
                    <!-- Header Premium -->
                    <header class="modulos-header">
                        <div class="modulos-header-info">
                            <h1>
                                <span class="material-icons modulos-header-icon">widgets</span>
                                Gerenciar Modulos
                                <span class="modulos-version-badge">v2.0</span>
                            </h1>
                            <p>Liga: <span class="liga-name" id="ligaNome">Carregando...</span></p>
                        </div>
                        <a href="gerenciar.html" class="btn-voltar">
                            <span class="material-icons">arrow_back</span>
                            Voltar
                        </a>
                    </header>

                    <!-- Stats Bar -->
                    <div class="modulos-stats-bar" id="modulosStatsBar">
                        <div class="modulos-stat-chip">
                            <div class="modulos-stat-icon" style="background: var(--color-primary-muted);">
                                <span class="material-icons" style="color: var(--color-primary);">extension</span>
                            </div>
                            <div class="modulos-stat-content">
                                <span class="modulos-stat-value" id="statTotal">--</span>
                                <span class="modulos-stat-label">Total</span>
                            </div>
                        </div>
                        <div class="modulos-stat-chip">
                            <div class="modulos-stat-icon" style="background: var(--color-success-muted);">
                                <span class="material-icons" style="color: var(--color-success);">toggle_on</span>
                            </div>
                            <div class="modulos-stat-content">
                                <span class="modulos-stat-value" id="statAtivos">--</span>
                                <span class="modulos-stat-label">Ativos</span>
                            </div>
                        </div>
                        <div class="modulos-stat-chip">
                            <div class="modulos-stat-icon" style="background: var(--color-primary-muted);">
                                <span class="material-icons" style="color: var(--color-primary);">lock</span>
                            </div>
                            <div class="modulos-stat-content">
                                <span class="modulos-stat-value" id="statBase">--</span>
                                <span class="modulos-stat-label">Base</span>
                            </div>
                        </div>
                        <div class="modulos-stat-chip">
                            <div class="modulos-stat-icon" style="background: var(--color-info-muted);">
                                <span class="material-icons" style="color: var(--color-info);">schedule</span>
                            </div>
                            <div class="modulos-stat-content">
                                <span class="modulos-stat-value" id="statPlanejados">--</span>
                                <span class="modulos-stat-label">Em Breve</span>
                            </div>
                        </div>
                    </div>

                    <!-- Status Message -->
                    <div id="statusMessage" class="status-message"></div>

                    <!-- Base Modules Section -->
                    <div class="section-title">
                        <span class="material-icons">lock</span>
                        <h2>Módulos Base</h2>
                        <span class="badge">Sempre Ativos</span>
                    </div>
                    <div class="modulos-grid" id="modulosBaseGrid"></div>

                    <!-- Optional Modules Section -->
                    <div class="section-title">
                        <span class="material-icons">widgets</span>
                        <h2>Módulos Opcionais</h2>
                    </div>
                    <div class="modulos-grid" id="modulosOpcionaisGrid"></div>

                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <a href="gerenciar.html" class="btn-secondary">
                            <span class="material-icons">arrow_back</span>
                            Voltar
                        </a>
                        <button class="btn-outline" id="btnExportarPDF" title="Exportar relatório de parametrizações em PDF">
                            <span class="material-icons">picture_as_pdf</span>
                            Exportar PDF
                        </button>
                        <button class="btn-primary" id="salvarBtn">
                            <span class="material-icons">save</span>
                            Salvar Configurações
                        </button>
                    </div>
                </div>
            </main>
        </div>

        <script type="module">
            // Importar sistema de configuração de módulos
            import '/js/modules/module-config-modal.js?v=20260128-1';
            // Importar exportação PDF
            import '/js/modules/module-config-pdf.js';

            let ligaId = null;
            let modulosState = {};

            // Opcional: configura tamanho dos blocos no grid de valores do modal
            // window.MODAL_GRID_CHUNK_SIZE = 8;

            // ✅ Guards para evitar dupla inicialização em SPA
            if (!window.__gm_state) {
                window.__gm_state = {
                    initRunning: false,
                    listenersBound: false
                };
            }

            const MODULOS_CONFIG = {
                extrato: {
                    icon: 'account_balance_wallet',
                    titulo: 'Extrato Financeiro',
                    descricao: 'Controle de mensalidades e pagamentos',
                    base: false, // Pode ser desativado (modo manutenção)
                    backendId: 'extrato'
                },
                ranking: {
                    icon: 'leaderboard',
                    titulo: 'Ranking Geral',
                    descricao: 'Classificação geral da liga',
                    base: true,
                    backendId: 'ranking_geral' // ✅ Mapeia para ranking_geral
                },
                rodadas: {
                    icon: 'event',
                    titulo: 'Por Rodadas',
                    descricao: 'Visualização rodada a rodada',
                    base: true,
                    backendId: 'ranking_rodada' // ✅ Mapeia para ranking_rodada
                },
                top10: {
                    icon: 'military_tech',
                    titulo: 'TOP 10',
                    descricao: 'Melhores e piores pontuações',
                    base: false,
                    backendId: 'top_10'
                },
                melhorMes: {
                    icon: 'calendar_month',
                    titulo: 'Melhor do Mês',
                    descricao: 'Competição mensal',
                    base: false,
                    backendId: 'melhor_mes'
                },
                pontosCorridos: {
                    icon: 'format_list_numbered',
                    titulo: 'Pontos Corridos',
                    descricao: 'Sistema de pontos corridos',
                    base: false,
                    backendId: 'pontos_corridos'
                },
                mataMata: {
                    icon: 'swords',
                    titulo: 'Mata-Mata',
                    descricao: 'Competição eliminatória',
                    base: false,
                    backendId: 'mata_mata'
                },
                artilheiro: {
                    icon: 'sports_soccer',
                    titulo: 'Artilheiro',
                    descricao: 'Ranking de artilheiros',
                    base: false,
                    backendId: 'artilheiro'
                },
                luvaOuro: {
                    icon: 'sports_mma',
                    titulo: 'Luva de Ouro',
                    descricao: 'Ranking de goleiros',
                    base: false,
                    backendId: 'luva_ouro'
                },
                capitaoLuxo: {
                    icon: 'military_tech',
                    titulo: 'Capitão de Luxo',
                    descricao: 'Ranking dos melhores capitães',
                    base: false,
                    backendId: 'capitao_luxo',
                    status: 'active'  // ✅ Implementado no backend
                },
                raioX: {
                    icon: 'sensors',
                    titulo: 'Raio-X da Rodada',
                    descricao: 'Análise inteligente pós-rodada com disputas',
                    base: false,
                    backendId: 'raio_x',
                    status: 'active',
                    hasWizard: false
                },
                campinho: {
                    icon: 'stadium',
                    titulo: 'Campinho Virtual',
                    descricao: 'Visualização da escalação no campo',
                    base: false,
                    backendId: 'campinho',
                    status: 'active',      // ✅ Módulo FUNCIONA no participante
                    hasWizard: false       // ⚠️ Sem wizard de configuração (usa defaults)
                },
                dicas: {
                    icon: 'lightbulb',
                    titulo: 'Dicas Premium',
                    descricao: 'Análises avançadas e sugestão de escalação',
                    base: false,
                    backendId: 'dicas',
                    status: 'planned'  // ✅ FIX CRIT-001: Módulo planejado
                },
                participantes: {
                    icon: 'groups',
                    titulo: 'Participantes',
                    descricao: 'Atalho de participantes na home do app',
                    base: false,
                    backendId: 'participantes',
                    status: 'active'
                },
                premiacoes: {
                    icon: 'emoji_events',
                    titulo: 'Premiações',
                    descricao: 'Atalho de premiações na home do app',
                    base: false,
                    backendId: 'premiacoes',
                    status: 'active',
                    hasWizard: false  // Atalho de navegação, sem configuração de wizard
                },
                regras: {
                    icon: 'menu_book',
                    titulo: 'Regras',
                    descricao: 'Atalho de regras na home do app',
                    base: false,
                    backendId: 'regras',
                    status: 'active'
                },
                cartolaPro: {
                    icon: 'workspace_premium',
                    titulo: 'Cartola PRO',
                    descricao: 'Atalho do Cartola PRO na home do app',
                    base: false,
                    backendId: 'cartola_pro',
                    status: 'active'
                },
                tiroCerto: {
                    icon: 'gps_fixed',
                    titulo: 'Tiro Certo',
                    descricao: 'Modo Survival — escolha o time vencedor ou seja eliminado',
                    base: false,
                    backendId: 'tiro_certo',
                    status: 'active',
                    adminPage: 'admin-tiro-certo.html'
                },
                restaUm: {
                    icon: 'sports_kabaddi',
                    titulo: 'Resta Um',
                    descricao: 'Competição de eliminação progressiva — sobreviva ou seja eliminado a cada rodada',
                    base: false,
                    backendId: 'resta_um',
                    status: 'active',
                    adminPage: 'admin-resta-um.html'
                }
            };

            async function init() {
                if (window.__gm_state.initRunning) return;
                window.__gm_state.initRunning = true;
                const urlParams = new URLSearchParams(window.location.search);
                ligaId = urlParams.get('id');

                if (!ligaId) {
                    showMessage('ID da liga não fornecido', 'error');
                    window.__gm_state.initRunning = false;
                    return;
                }

                try {
                    await loadLayout();

                    // ✅ FIX CRÍTICO: Recarregar ligas do sidebar após navegação SPA
                    // BUG: loadLayout() pula injeção se sidebar existe, mas não recarrega ligas
                    // Resultado: sidebar fica travado em "Carregando ligas..." ao navegar de volta
                    if (typeof window.carregarLigasLayout === 'function') {
                        console.log('[GERENCIAR-MODULOS] Recarregando ligas do sidebar após navegação SPA...');
                        await window.carregarLigasLayout();
                    }

                    await loadLiga();
                    await loadModulos();
                } finally {
                    window.__gm_state.initRunning = false;
                }
            }

            async function loadLayout() {
                try {
                    // ✅ FIX: Não recarregar layout se já existe sidebar (navegação SPA)
                    if (document.querySelector('.app-sidebar')) {
                        console.log('[GERENCIAR-MODULOS] Sidebar já existe, pulando loadLayout');
                        return;
                    }

                    const response = await fetch('layout.html');
                    const html = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const sidebar = doc.querySelector('.app-sidebar');
                    if (sidebar) {
                        document.getElementById('sidebar-placeholder')?.replaceWith(sidebar);
                    }

                    // ✅ FIX: Só injetar scripts do layout na PRIMEIRA carga
                    // Em navegação SPA, os scripts já estão no DOM
                    if (!window.__layoutScriptsInjected) {
                        window.__layoutScriptsInjected = true;
                        const scripts = doc.querySelectorAll("script");
                        scripts.forEach((script) => {
                            if (script.textContent.trim()) {
                                const newScript = document.createElement("script");
                                newScript.textContent = `(function(){${script.textContent}})();`;
                                document.head.appendChild(newScript);
                            }
                        });
                    }

                    // Garantir que AccordionManager seja inicializado e dados do admin carregados
                    setTimeout(() => {
                        if (window.AccordionManager && !window.AccordionManager._initialized) {
                            window.AccordionManager.init();
                        }
                        if (typeof window.verificarMenuSuperAdmin === 'function') {
                            window.verificarMenuSuperAdmin();
                        }
                    }, 150);
                } catch (error) {
                    console.error('Erro ao carregar layout:', error);
                }
            }

            async function loadLiga() {
                try {
                    const response = await fetch(`/api/ligas/${ligaId}`);
                    const liga = await response.json();
                    document.getElementById('ligaNome').textContent = liga.nome;
                } catch (error) {
                    console.error('Erro ao carregar liga:', error);
                    document.getElementById('ligaNome').textContent = 'Erro ao carregar';
                }
            }

            async function loadModulos() {
                try {
                    const response = await fetch(`/api/ligas/${ligaId}/modulos-ativos`);
                    const data = await response.json();

                    // Garantir que todas as keys do MODULOS_CONFIG existam em modulosState
                    // Evita que undefined seja tratado como true no render
                    const defaults = {};
                    Object.keys(MODULOS_CONFIG).forEach(key => {
                        defaults[key] = MODULOS_CONFIG[key].base ? true : false;
                    });
                    modulosState = { ...defaults, ...data.modulos };

                    renderModulos();
                } catch (error) {
                    console.error('Erro ao carregar módulos:', error);
                    showMessage('Erro ao carregar módulos', 'error');
                }
            }

            function renderModulos() {
                const baseGrid = document.getElementById('modulosBaseGrid');
                const opcionaisGrid = document.getElementById('modulosOpcionaisGrid');
                baseGrid.innerHTML = '';
                opcionaisGrid.innerHTML = '';

                Object.entries(MODULOS_CONFIG).forEach(([key, config]) => {
                    const isAtivo = modulosState[key] !== false;
                    const card = document.createElement('div');

                    let cardClass = 'modulo-card';
                    if (config.base) cardClass += ' base ativo';
                    else cardClass += isAtivo ? ' ativo' : ' inativo';

                    card.className = cardClass;
                    card.dataset.moduloKey = key; // Adicionar data attribute

                    card.innerHTML = `
                        <div class="modulo-card-header">
                            <div class="modulo-card-info">
                                <div class="modulo-icon">
                                    <span class="material-icons">${config.icon}</span>
                                </div>
                                <span class="modulo-title">
                                    ${config.titulo}
                                    ${config.base ? '<span class="badge-base">Base</span>' : ''}
                                    ${config.status === 'planned' ? '<span class="badge-planned">Em Breve</span>' : ''}
                                    ${config.adminPage ? '<span class="badge-no-config">Admin</span>' : ''}
                                    ${config.hasWizard === false && !config.base && !config.adminPage ? '<span class="badge-no-config">Sem Config</span>' : ''}
                                </span>
                            </div>
                            <label class="toggle-switch" onclick="event.stopPropagation();">
                                <input type="checkbox"
                                       ${isAtivo ? 'checked' : ''}
                                       ${config.base || config.status === 'planned' ? 'disabled' : ''}
                                       data-modulo="${key}">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="modulo-desc">
                            ${config.descricao}
                            ${config.base ? ' <span class="badge-always-active"><span class="material-icons" style="font-size: 12px; vertical-align: middle;">check_circle</span> Sempre Ativo</span>' : ''}
                            ${config.status === 'planned' ? '<br><small class="modulo-planned-note"><span class="material-icons" style="font-size: 14px; vertical-align: middle;">rocket_launch</span> Modulo em desenvolvimento</small>' : ''}
                            ${config.adminPage ? '<br><small class="modulo-noconfig-note"><span class="material-icons" style="font-size: 14px; vertical-align: middle;">open_in_new</span> Clique para abrir painel admin</small>' : ''}
                            ${config.hasWizard === false && !config.base && !config.adminPage ? '<br><small class="modulo-noconfig-note"><span class="material-icons" style="font-size: 14px; vertical-align: middle;">settings</span> Usa configuracoes padrao</small>' : ''}
                        </div>
                    `;

                    // ✅ FIX: Evento de toggle apenas para módulos opcionais (não base)
                    if (!config.base) {
                        const toggle = card.querySelector('input[type="checkbox"]');
                        toggle.addEventListener('change', (e) => {
                            e.stopPropagation();
                            modulosState[key] = e.target.checked;
                            card.className = `modulo-card ${e.target.checked ? 'ativo' : 'inativo'}`;
                        });
                    }

                    // ✅ FIX CRIT-001: Evento de clique baseado em status e hasWizard
                    if (config.status === 'planned' || config.status === 'deprecated') {
                        // Módulos planejados/deprecated não são clicáveis
                        card.style.cursor = 'not-allowed';
                        card.style.opacity = '0.7';
                    } else {
                        // Módulos ativos são clicáveis (mesmo sem wizard, para mostrar aviso)
                        card.addEventListener('click', () => onCardClick(key));
                        card.style.cursor = 'pointer';
                    }

                    if (config.base) {
                        baseGrid.appendChild(card);
                    } else {
                        opcionaisGrid.appendChild(card);
                    }
                });

                // Atualizar stats bar
                const configs = Object.entries(MODULOS_CONFIG);
                const totalCount = configs.length;
                const baseCount = configs.filter(([,c]) => c.base).length;
                const plannedCount = configs.filter(([,c]) => c.status === 'planned').length;
                const activeCount = configs.filter(([key, c]) => c.base || modulosState[key] !== false).length;

                const elTotal = document.getElementById('statTotal');
                const elAtivos = document.getElementById('statAtivos');
                const elBase = document.getElementById('statBase');
                const elPlanejados = document.getElementById('statPlanejados');
                if (elTotal) elTotal.textContent = totalCount;
                if (elAtivos) elAtivos.textContent = activeCount;
                if (elBase) elBase.textContent = baseCount;
                if (elPlanejados) elPlanejados.textContent = plannedCount;
            }

            async function salvarModulos() {
                const btn = document.getElementById('salvarBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="material-icons">hourglass_empty</span> Salvando...';

                // Forçar módulos base sempre ativos antes de enviar
                Object.keys(MODULOS_CONFIG).forEach(key => {
                    if (MODULOS_CONFIG[key].base) {
                        modulosState[key] = true;
                    }
                });

                try {
                    console.log('[FRONTEND] Salvando módulos:', modulosState);
                    const response = await fetch(`/api/ligas/${ligaId}/modulos-ativos`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ modulos: modulosState })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        console.error('[FRONTEND] Erro do servidor:', errorData);
                        throw new Error(errorData.erro || errorData.error || 'Erro ao salvar');
                    }

                    // ✅ FIX: Atualizar estado com resposta do servidor
                    const data = await response.json();
                    modulosState = data.modulos;

                    // ✅ FIX: Re-renderizar cards para refletir novo estado
                    renderModulos();

                    showMessage('✅ Configurações salvas! Mudanças refletirão no app dos participantes em até 30 segundos.', 'success');

                    setTimeout(() => {
                        // Manter usuário na tela atual para navegação mais fluida
                        if (typeof window.refreshLigasSidebar === 'function') {
                            window.refreshLigasSidebar();
                        }
                    }, 600);

                } catch (error) {
                    console.error('Erro ao salvar:', error);
                    showMessage('Erro ao salvar configurações', 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<span class="material-icons">save</span> Salvar Configurações';
                }
            }

            // Tornar showMessage global para que module-config-modal.js possa acessar
            window.showMessage = function(text, type) {
                const msg = document.getElementById('statusMessage');
                const icon = type === 'success' ? 'check_circle' : type === 'warning' ? 'warning' : type === 'info' ? 'info' : 'error';
                msg.innerHTML = `<span class="material-icons">${icon}</span> ${text}`;
                msg.className = `status-message ${type}`;

                if (type === 'success' || type === 'info') {
                    setTimeout(() => {
                        msg.className = 'status-message';
                    }, 3000);
                }
            };

            /**
             * Verifica se módulo pode ser configurado
             */
            function isModuloConfiguravel(moduloKey) {
                const config = MODULOS_CONFIG[moduloKey];

                // Módulos base SÃO configuráveis (mudança: base também configura)
                // Módulos opcionais só se estiverem ativos
                if (config.base) return true;
                return modulosState[moduloKey] === true;
            }

            /**
             * Abre modal de configuração ao clicar no card
             */
            async function onCardClick(moduloKey) {
                const config = MODULOS_CONFIG[moduloKey];
                const estaAtivo = config.base || modulosState[moduloKey] !== false;

                // ✅ FIX CRIT-001: Verificar status do módulo antes de qualquer ação
                if (config.status === 'planned') {
                    showMessage('⏳ Este módulo está em desenvolvimento e será lançado em breve!', 'info');
                    return;
                }

                if (config.status === 'deprecated') {
                    showMessage('⚠️ Este módulo foi descontinuado', 'warning');
                    return;
                }

                // Módulos com página admin dedicada → redirecionar
                if (config.adminPage) {
                    window.location.href = config.adminPage;
                    return;
                }

                // Módulos sem wizard de configuração
                if (config.hasWizard === false) {
                    showMessage('Este módulo funciona com configurações padrão. Use o toggle para ativar/desativar.', 'info');
                    return;
                }

                // Verificar se pode configurar
                if (!estaAtivo) {
                    showMessage('Ative o módulo primeiro usando o toggle', 'warning');
                    return;
                }

                // Mapear para ID do backend
                const backendId = config.backendId || moduloKey;

                // Abrir modal de configuração
                console.log(`[GERENCIAR-MODULOS] Abrindo configuração: ${moduloKey} → ${backendId}`);

                try {
                    const modal = new window.ModuleConfigModal();
                    await modal.init(ligaId, backendId); // ✅ Usa backendId
                } catch (error) {
                    console.error('[GERENCIAR-MODULOS] Erro ao abrir modal:', error);

                    // ✅ FIX CRIT-001: Mensagem mais específica baseada no tipo de erro
                    let errorMsg = 'Erro ao carregar configuração';
                    if (error.message?.includes('400')) {
                        errorMsg = 'Módulo não disponível para configuração. Verifique se está implementado no backend.';
                    } else if (error.message?.includes('Timeout')) {
                        errorMsg = 'Timeout: servidor não respondeu a tempo';
                    }

                    showMessage(errorMsg, 'error');
                }
            }

            if (!window.__gm_state.listenersBound) {
                window.__gm_state.listenersBound = true;
                document.getElementById('salvarBtn')?.addEventListener('click', salvarModulos);
                document.getElementById('btnExportarPDF')?.addEventListener('click', () => {
                    if (window.exportarParametrizacoesPDF) {
                        window.exportarParametrizacoesPDF(ligaId);
                    } else {
                        showMessage('Módulo de exportação PDF não carregado', 'error');
                    }
                });
            }

            if (!window.__gm_domcontent_guard) {
                window.__gm_domcontent_guard = true;
                document.addEventListener('DOMContentLoaded', () => {
                    if (!window.location.pathname.includes('gerenciar-modulos.html')) return;
                    init();
                    // Re-bind do botão após init
                    const btn = document.getElementById('salvarBtn');
                    if (btn && !btn._bound) {
                        btn.addEventListener('click', salvarModulos);
                        btn._bound = true;
                    }
                });
            }

            // ✅ FIX: Reinicializar após navegação SPA
            if (!window.__gm_spa_guard) {
                window.__gm_spa_guard = true;
                window.addEventListener('spa:navigated', (e) => {
                    const { pageName } = e.detail || {};
                    if (pageName === 'gerenciar-modulos.html') {
                        console.log('[GERENCIAR-MODULOS] Reinicializando após navegação SPA...');
                        init();
                        const btn = document.getElementById('salvarBtn');
                        if (btn && !btn._bound) {
                            btn.addEventListener('click', salvarModulos);
                            btn._bound = true;
                        }
                    }
                });

                // ✅ FIX: Recarregar estado após salvar configuração do modal
                window.addEventListener('modulo-config-saved', async (e) => {
                    console.log('[GERENCIAR-MODULOS] Configuração salva via modal, recarregando estado...');
                    await loadModulos();
                    showMessage('Módulo configurado e ativado com sucesso!', 'success');
                });
            }

            // ✅ FIX: Inicializar se DOM já pronto (navegação SPA)
            if (!window.__gm_ready_guard) {
                window.__gm_ready_guard = true;
                if (document.readyState !== 'loading' && window.location.pathname.includes('gerenciar-modulos.html')) {
                    init();
                }
            }
        </script>
    </body>
</html>
