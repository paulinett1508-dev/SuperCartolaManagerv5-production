<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas de Jogos - Admin - Super Cartola Manager</title>
    <!-- Design Tokens (SEMPRE PRIMEIRO) -->
    <link rel="stylesheet" href="css/_admin-tokens.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/modules/dashboard-redesign.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Russo+One&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/modules/super-modal.css" />
    <link rel="stylesheet" href="css/modules/tabelas-jogos.css" />
    <script src="js/super-modal.js"></script>
</head>
<body>
    <!-- Mobile Sidebar Toggle -->
    <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" onclick="toggleMobileSidebar()">
        <span class="material-icons">menu</span>
    </button>

    <div class="admin-page">
        <div id="sidebar-placeholder"></div>
        <main class="main-content">
            <div class="admin-content">
                <div class="tj-admin-container">

                    <!-- Header -->
                    <div class="tj-admin-header">
                        <div>
                            <h1>
                                <span class="material-icons" style="color:var(--laranja);">sports_soccer</span>
                                Tabelas de Jogos
                            </h1>
                            <p>Calendario completo dos campeonatos</p>
                        </div>
                        <a href="painel.html" class="tj-btn-voltar">
                            <span class="material-icons">arrow_back</span>
                            Voltar
                        </a>
                    </div>

                    <!-- Stats -->
                    <div class="tj-stats-grid" id="tjStats">
                        <div class="tj-stat">
                            <div class="tj-stat-value" id="tjStatRodada">--</div>
                            <div class="tj-stat-label">Rodada Atual</div>
                        </div>
                        <div class="tj-stat">
                            <div class="tj-stat-value" id="tjStatJogos">--</div>
                            <div class="tj-stat-label">Jogos Realizados</div>
                        </div>
                        <div class="tj-stat">
                            <div class="tj-stat-value" id="tjStatRestantes">--</div>
                            <div class="tj-stat-label">Restantes</div>
                        </div>
                        <div class="tj-stat">
                            <div class="tj-stat-value" id="tjStatFonte">--</div>
                            <div class="tj-stat-label">Fonte</div>
                        </div>
                    </div>

                    <!-- Card: Campeonato Brasileiro - Serie A -->
                    <div class="tj-card">
                        <div class="tj-card-header">
                            <div class="tj-card-icon">
                                <span class="material-icons">emoji_events</span>
                            </div>
                            <div style="flex:1;">
                                <div class="tj-card-title">Campeonato Brasileiro 2026 - Serie A</div>
                                <div class="tj-card-subtitle">38 rodadas · 20 clubes · 380 jogos</div>
                            </div>
                        </div>
                        <div class="tj-card-body" id="tjRodadasContainer">
                            <div class="tj-loading">
                                <span class="material-icons">sync</span>
                                Carregando calendario...
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Carregar sidebar do layout -->
    <script>
        async function carregarLayout() {
            try {
                const response = await fetch('layout.html');
                const layoutHtml = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(layoutHtml, 'text/html');
                const sidebar = doc.querySelector('.app-sidebar');
                if (sidebar) {
                    document.getElementById('sidebar-placeholder')?.replaceWith(sidebar);
                }
                const scripts = doc.querySelectorAll('script');
                scripts.forEach(script => {
                    if (script.textContent.trim()) {
                        const newScript = document.createElement('script');
                        newScript.textContent = `(function(){${script.textContent}})();`;
                        document.head.appendChild(newScript);
                    }
                });
                setTimeout(() => {
                    if (typeof window.verificarMenuSuperAdmin === 'function') {
                        window.verificarMenuSuperAdmin();
                    }
                }, 150);
            } catch (error) {
                console.error('Erro ao carregar layout:', error);
            }
        }
        carregarLayout();
    </script>

    <!-- Controller -->
    <script src="js/admin/modules/admin-tabelas-jogos.js?v=1.1.0"></script>
</body>
</html>
