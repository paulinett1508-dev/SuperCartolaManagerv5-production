<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Manutenção Avançado - Super Cartola Manager</title>

    <!-- Design Tokens (SEMPRE PRIMEIRO) -->
    <link rel="stylesheet" href="/css/_admin-tokens.css">
    <!-- Base CSS -->
    <link rel="stylesheet" href="/style.css">
    <!-- Módulo específico -->
    <link rel="stylesheet" href="/css/modules/manutencao-avancado.css">
    <!-- Sistema de modais -->
    <link rel="stylesheet" href="/css/modules/super-modal.css">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="/js/super-modal.js"></script>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="app-main mav-page">
        <div class="mav-container">

            <!-- Header -->
            <header class="mav-header">
                <div class="mav-header-left">
                    <a href="painel.html" class="mav-btn-voltar">
                        <span class="material-icons">arrow_back</span>
                        Voltar
                    </a>
                    <h1 class="mav-title">
                        <span class="material-icons">build</span>
                        Modo Manutenção Avançado
                    </h1>
                </div>
                <div id="statusIndicator">
                    <span class="mav-status-badge carregando">
                        <span class="mav-status-dot"></span>
                        Carregando...
                    </span>
                </div>
            </header>

            <!-- Status Atual -->
            <section class="mav-card">
                <h2 class="mav-card-title">
                    <span class="material-icons" style="color:var(--color-info)">monitoring</span>
                    Status Atual
                </h2>
                <div id="statusContent" class="mav-status-content">
                    <span style="color:var(--text-disabled)">Carregando...</span>
                </div>
            </section>

            <!-- Configuração -->
            <section class="mav-card">
                <h2 class="mav-card-title">
                    <span class="material-icons" style="color:var(--color-primary)">settings</span>
                    Configuração
                </h2>

                <!-- Modo de Operação -->
                <div class="mav-field">
                    <label class="mav-form-label">Modo de Operação</label>
                    <div class="mav-radio-group">
                        <label class="mav-radio-item">
                            <input type="radio" name="modo" value="global" checked>
                            <div class="mav-radio-label">
                                <strong>Global</strong>
                                <span>Bloqueia todo o app para todos os usuários</span>
                            </div>
                        </label>
                        <label class="mav-radio-item">
                            <input type="radio" name="modo" value="modulos">
                            <div class="mav-radio-label">
                                <strong>Módulos Específicos</strong>
                                <span>Bloqueia apenas módulos selecionados</span>
                            </div>
                        </label>
                        <label class="mav-radio-item">
                            <input type="radio" name="modo" value="usuarios">
                            <div class="mav-radio-label">
                                <strong>Usuários Específicos</strong>
                                <span>Bloqueia apenas IDs selecionados (blacklist)</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Template -->
                <div class="mav-field">
                    <label class="mav-form-label">Template</label>
                    <select id="templateSelect" class="mav-select">
                        <option value="">Carregando templates...</option>
                    </select>
                </div>

                <!-- Customização -->
                <div class="mav-subsection">
                    <h3 class="mav-subsection-title">
                        <span class="material-icons" style="color:var(--color-primary-light)">palette</span>
                        Customização
                    </h3>

                    <div class="mav-grid-2">
                        <div class="mav-field">
                            <label class="mav-form-label">Título</label>
                            <input type="text" id="customTitulo" placeholder="Calma aê!" class="mav-input">
                        </div>
                        <div class="mav-field">
                            <label class="mav-form-label">Emoji</label>
                            <input type="text" id="customEmoji" placeholder="🛠️" maxlength="2" class="mav-input-emoji">
                        </div>
                    </div>

                    <div class="mav-field">
                        <label class="mav-form-label">Mensagem</label>
                        <textarea id="customMensagem" rows="3" placeholder="Estamos aplicando melhorias no app. Voltamos em breve!" class="mav-textarea"></textarea>
                    </div>

                    <div class="mav-grid-2">
                        <div class="mav-field">
                            <label class="mav-form-label">Cor Primária</label>
                            <div class="mav-color-row">
                                <input type="color" id="customCorPrimaria" value="#f97316" class="mav-color-picker">
                                <input type="text" id="customCorPrimariaText" value="#f97316" class="mav-input mono">
                            </div>
                        </div>
                        <div class="mav-field">
                            <label class="mav-form-label">Cor Secundária</label>
                            <div class="mav-color-row">
                                <input type="color" id="customCorSecundaria" value="#ea580c" class="mav-color-picker">
                                <input type="text" id="customCorSecundariaText" value="#ea580c" class="mav-input mono">
                            </div>
                        </div>
                    </div>

                    <div class="mav-field">
                        <label class="mav-form-label">Imagem / Banner</label>
                        <div class="mav-upload-row">
                            <input type="file" id="uploadImagem" accept="image/*" style="display:none">
                            <button onclick="ManutencaoConfig.selecionarImagem()" class="mav-btn--upload">
                                <span class="material-icons">attach_file</span>
                                Upload
                            </button>
                            <button onclick="ManutencaoConfig.removerImagem()" class="mav-btn--remove">
                                <span class="material-icons">delete</span>
                                Remover
                            </button>
                            <div id="imagemStatus" class="mav-upload-status">
                                Nenhuma imagem selecionada
                            </div>
                        </div>
                        <div id="imagemPreview" class="mav-image-preview">
                            <img src="" alt="Preview">
                        </div>
                    </div>

                    <div class="mav-field">
                        <label class="mav-form-label">Opções de Exibição</label>
                        <div class="mav-checkbox-group">
                            <label class="mav-checkbox-item">
                                <input type="checkbox" id="customMostrarRanking" checked>
                                <span class="mav-checkbox-label">Mostrar ranking</span>
                            </label>
                            <label class="mav-checkbox-item">
                                <input type="checkbox" id="customMostrarNoticias" checked>
                                <span class="mav-checkbox-label">Mostrar notícias do time</span>
                            </label>
                            <label class="mav-checkbox-item">
                                <input type="checkbox" id="customMostrarUltimaRodada" checked>
                                <span class="mav-checkbox-label">Mostrar última rodada</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Controle de Acesso -->
                <div id="controleAcessoSection" class="mav-subsection">
                    <h3 class="mav-subsection-title">
                        <span class="material-icons" style="color:var(--color-danger)">lock</span>
                        Controle de Acesso
                    </h3>

                    <div class="mav-field">
                        <label class="mav-form-label">Tipo de Lista</label>
                        <div class="mav-radio-group">
                            <label class="mav-radio-item">
                                <input type="radio" name="modoLista" value="whitelist" checked>
                                <span class="mav-checkbox-label">Whitelist — liberar IDs específicos</span>
                            </label>
                            <label class="mav-radio-item">
                                <input type="radio" name="modoLista" value="blacklist">
                                <span class="mav-checkbox-label">Blacklist — bloquear IDs específicos</span>
                            </label>
                        </div>
                    </div>

                    <div class="mav-field">
                        <label class="mav-form-label">IDs (separados por vírgula)</label>
                        <input type="text" id="listaIds" placeholder="13935277, 987654, 123456" class="mav-input mono">
                        <p class="mav-field-help">Os IDs podem ser encontrados na URL do time no Cartola FC</p>
                    </div>
                </div>

                <!-- Módulos Bloqueados -->
                <div id="modulosBloqueadosSection" class="mav-subsection" style="display:none">
                    <h3 class="mav-subsection-title">
                        <span class="material-icons" style="color:var(--color-warning)">inventory_2</span>
                        Módulos Bloqueados
                    </h3>
                    <div class="mav-modulos-grid">
                        <label class="mav-checkbox-item">
                            <input type="checkbox" value="extrato" class="modulo-checkbox">
                            <span class="mav-checkbox-label">Extrato</span>
                        </label>
                        <label class="mav-checkbox-item">
                            <input type="checkbox" value="ranking" class="modulo-checkbox">
                            <span class="mav-checkbox-label">Ranking</span>
                        </label>
                        <label class="mav-checkbox-item">
                            <input type="checkbox" value="rodadas" class="modulo-checkbox">
                            <span class="mav-checkbox-label">Rodadas</span>
                        </label>
                        <label class="mav-checkbox-item">
                            <input type="checkbox" value="top10" class="modulo-checkbox">
                            <span class="mav-checkbox-label">Top 10</span>
                        </label>
                        <label class="mav-checkbox-item">
                            <input type="checkbox" value="artilheiro" class="modulo-checkbox">
                            <span class="mav-checkbox-label">Artilheiro</span>
                        </label>
                        <label class="mav-checkbox-item">
                            <input type="checkbox" value="luvaOuro" class="modulo-checkbox">
                            <span class="mav-checkbox-label">Luva de Ouro</span>
                        </label>
                        <label class="mav-checkbox-item">
                            <input type="checkbox" value="capitaoLuxo" class="modulo-checkbox">
                            <span class="mav-checkbox-label">Capitão de Luxo</span>
                        </label>
                        <label class="mav-checkbox-item">
                            <input type="checkbox" value="pontosCorridos" class="modulo-checkbox">
                            <span class="mav-checkbox-label">Pontos Corridos</span>
                        </label>
                        <label class="mav-checkbox-item">
                            <input type="checkbox" value="mataMata" class="modulo-checkbox">
                            <span class="mav-checkbox-label">Mata-Mata</span>
                        </label>
                    </div>
                </div>

                <!-- Ações -->
                <div class="mav-field" style="margin-top:var(--space-5)">
                    <button onclick="ManutencaoConfig.mostrarPreview()" class="mav-btn mav-btn--secondary">
                        <span class="material-icons">visibility</span>
                        Visualizar Preview
                    </button>
                </div>
                <div class="mav-field">
                    <button onclick="ManutencaoConfig.salvar()" class="mav-btn mav-btn--primary">
                        <span class="material-icons">save</span>
                        Salvar Configuração
                    </button>
                </div>
                <div class="mav-actions-row">
                    <button onclick="ManutencaoConfig.ativar()" class="mav-btn mav-btn--success">
                        <span class="material-icons">check_circle</span>
                        Ativar Manutenção
                    </button>
                    <button onclick="ManutencaoConfig.desativar()" class="mav-btn mav-btn--danger">
                        <span class="material-icons">cancel</span>
                        Desativar Manutenção
                    </button>
                </div>
            </section>

        </div>
    </main>

    <script src="js/admin-shell.js"></script>
    <script src="/js/manutencao-config.js"></script>
    <script>
        function initManutencaoAvancado() {
            ManutencaoConfig.inicializar();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initManutencaoAvancado);
        } else {
            initManutencaoAvancado();
        }

        // Controlar visibilidade de seções baseado no modo
        document.querySelectorAll('input[name="modo"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const modo = e.target.value;
                const modulosSection = document.getElementById('modulosBloqueadosSection');
                const controleSection = document.getElementById('controleAcessoSection');

                if (modo === 'modulos') {
                    modulosSection.style.display = 'block';
                    controleSection.style.display = 'none';
                } else {
                    modulosSection.style.display = 'none';
                    controleSection.style.display = 'block';
                }
            });
        });

        // Sincronizar color pickers com inputs de texto
        document.getElementById('customCorPrimaria').addEventListener('input', (e) => {
            document.getElementById('customCorPrimariaText').value = e.target.value;
        });
        document.getElementById('customCorPrimariaText').addEventListener('input', (e) => {
            document.getElementById('customCorPrimaria').value = e.target.value;
        });
        document.getElementById('customCorSecundaria').addEventListener('input', (e) => {
            document.getElementById('customCorSecundariaText').value = e.target.value;
        });
        document.getElementById('customCorSecundariaText').addEventListener('input', (e) => {
            document.getElementById('customCorSecundaria').value = e.target.value;
        });
    </script>
</body>
</html>
