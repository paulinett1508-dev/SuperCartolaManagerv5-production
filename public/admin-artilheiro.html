<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artilheiro Campeao - Admin - Super Cartola Manager</title>
    <!-- Design Tokens (SEMPRE PRIMEIRO) -->
    <link rel="stylesheet" href="css/_admin-tokens.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/modules/dashboard-redesign.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Russo+One&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/modules/super-modal.css" />
    <link rel="stylesheet" href="css/modules/admin-artilheiro.css" />
    <script src="js/super-modal.js"></script>
</head>
<body>
    <!-- Mobile Sidebar Toggle -->
    <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" onclick="toggleMobileSidebar()">
        <span class="material-icons">menu</span>
    </button>

    <div class="admin-page">
        <div id="sidebar-placeholder"></div>
        <main class="main-content">
            <div class="admin-content">
                <div class="ac-admin-container">

                    <!-- Header -->
                    <div class="ac-admin-header">
                        <div>
                            <h1>
                                <span class="material-icons" style="color:var(--module-artilheiro-primary);">military_tech</span>
                                Artilheiro Campeao
                            </h1>
                            <p>Ranking de gols, consolidacao e premiacao</p>
                        </div>
                        <a href="gerenciar.html" class="ac-btn-voltar">
                            <span class="material-icons">arrow_back</span>
                            Voltar
                        </a>
                    </div>

                    <!-- Seletor de Liga -->
                    <div class="ac-liga-selector">
                        <select id="acLigaSelect" onchange="window.adminArtilheiro.onLigaChange()">
                            <option value="">Selecione uma liga...</option>
                        </select>
                    </div>

                    <!-- Conteudo principal (carregado via JS) -->
                    <div id="acAdminContent">
                        <div class="ac-empty">
                            <span class="material-icons" style="font-size:3rem;opacity:0.3;">military_tech</span>
                            <p>Selecione uma liga para gerenciar o Artilheiro Campeao</p>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Carregar sidebar do layout -->
    <script>
        async function carregarLayout() {
            try {
                const response = await fetch('layout.html');
                const layoutHtml = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(layoutHtml, 'text/html');
                const sidebar = doc.querySelector('.app-sidebar');
                if (sidebar) {
                    document.getElementById('sidebar-placeholder')?.replaceWith(sidebar);
                }
                const scripts = doc.querySelectorAll('script');
                scripts.forEach(script => {
                    if (script.textContent.trim()) {
                        const newScript = document.createElement('script');
                        newScript.textContent = `(function(){${script.textContent}})();`;
                        document.head.appendChild(newScript);
                    }
                });
                setTimeout(() => {
                    if (typeof window.verificarMenuSuperAdmin === 'function') {
                        window.verificarMenuSuperAdmin();
                    }
                }, 150);
            } catch (error) {
                console.error('Erro ao carregar layout:', error);
            }
        }
        carregarLayout();
    </script>

    <!-- Controller JS -->
    <script src="js/admin/modules/admin-artilheiro.js?v=2.0.0"></script>
</body>
</html>
