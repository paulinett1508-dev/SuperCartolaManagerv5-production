<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auditoria de Extratos - Super Cartola Manager</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <!-- Design Tokens (SEMPRE PRIMEIRO) -->
    <link rel="stylesheet" href="css/_admin-tokens.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/modules/dashboard-redesign.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/modules/super-modal.css" />
    <script src="js/super-modal.js"></script>
    <style>
        .audit-page {
            background: var(--surface-bg);
            min-height: 100vh;
        }

        .audit-content {
            padding: 20px 16px;
        }

        .audit-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            margin-bottom: 24px;
            border: 1px solid var(--color-primary);
            position: relative;
            overflow: hidden;
        }

        .audit-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light), var(--color-primary));
        }

        .audit-header h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 8px 0;
        }

        .audit-header h1 .material-icons {
            font-size: 28px;
            color: var(--color-primary);
        }

        .audit-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        .liga-selector {
            background: var(--surface-card);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .liga-selector label {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
        }

        .liga-selector select {
            width: 100%;
            padding: 12px;
            background: var(--surface-card-elevated);
            border: 1px solid #444;
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .liga-selector select:focus {
            border-color: var(--color-primary);
            outline: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface-card);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-card.ok { border-color: var(--color-success); }
        .stat-card.error { border-color: var(--color-danger); }
        .stat-card.warning { border-color: var(--color-warning); }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .stat-card.ok .stat-value { color: var(--color-success); }
        .stat-card.error .stat-value { color: var(--color-danger); }
        .stat-card.warning .stat-value { color: var(--color-warning); }

        .problems-section {
            background: var(--surface-card);
            border-radius: var(--radius-md);
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        .problems-section h3 {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin: 0 0 16px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .problems-section h3 .material-icons { color: var(--color-danger); }

        .problem-item {
            background: var(--surface-card-elevated);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 3px solid var(--color-danger);
        }

        .problem-item:last-child { margin-bottom: 0; }
        .problem-name { color: var(--text-primary); font-weight: 600; margin-bottom: 4px; }
        .problem-errors { color: var(--text-muted); font-size: 0.85rem; }
        .problem-errors li { margin: 4px 0; }

        .btn-audit {
            background: var(--gradient-primary);
            color: var(--text-primary);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            transition: var(--transition-normal);
        }

        .btn-audit:hover {
            background: var(--gradient-primary-hover);
            box-shadow: var(--shadow-primary);
        }

        .btn-audit:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-audit .material-icons { font-size: 20px; }

        .btn-fix {
            background: linear-gradient(135deg, var(--color-success), var(--color-success-light));
            color: var(--text-primary);
            margin-left: 8px;
        }

        .btn-fix:hover {
            background: linear-gradient(135deg, var(--color-success-light), var(--color-success));
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px;
            color: var(--text-muted);
        }

        .loading .material-icons { animation: admin-spin 1s linear infinite; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-badge.ok { background: var(--color-success-muted); color: var(--color-success); }
        .status-badge.error { background: var(--color-danger-muted); color: var(--color-danger); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-disabled);
        }

        .empty-state .material-icons { font-size: 48px; margin-bottom: 12px; }

        .actions-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Seção de correção */
        .fix-section {
            margin-top: 16px;
            padding: 16px;
            background: var(--surface-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        .fix-section h3 {
            color: var(--text-primary);
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fix-section p {
            color: var(--text-muted);
            margin: 0 0 12px 0;
            font-size: 0.9rem;
        }

        /* Seção de acertos */
        .acertos-section {
            margin-top: 16px;
            padding: 16px;
            background: var(--surface-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        .acertos-section h3 {
            color: var(--text-primary);
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .acertos-section p {
            color: var(--text-muted);
            margin: 4px 0;
        }

        .acertos-section strong {
            color: var(--text-primary);
        }

        /* Results header */
        .results-header {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .results-header h2 {
            color: var(--text-primary);
            margin: 0;
        }

        /* Fix results */
        .fix-results {
            margin-top: 12px;
        }

        .fix-result-box {
            padding: 12px;
            border-radius: 6px;
        }

        .fix-result-box.dry-run {
            background: var(--surface-card-elevated);
            border: 1px solid #444;
        }

        .fix-result-box.success {
            background: var(--color-success-muted);
            border: 1px solid var(--color-success);
        }

        .fix-result-box.error {
            background: var(--color-danger-muted);
            border: 1px solid var(--color-danger);
        }

        .fix-result-box p {
            margin: 0;
        }

        .fix-result-box p:first-child {
            font-weight: 600;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar sera injetado -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="app-main audit-page">
            <div class="audit-content">
                <header class="audit-header">
                    <h1>
                        <span class="material-icons">fact_check</span>
                        Auditoria de Extratos Financeiros
                    </h1>
                    <p>Verificar integridade dos caches de extrato financeiro</p>
                </header>

                <div class="liga-selector">
                    <label for="ligaSelect">Selecione a Liga:</label>
                    <select id="ligaSelect">
                        <option value="">-- Carregando ligas... --</option>
                    </select>
                    <div class="actions-bar">
                        <button class="btn-audit" id="btnAudit" disabled>
                            <span class="material-icons">search</span>
                            Executar Auditoria
                        </button>
                    </div>
                </div>

                <div id="auditResults"></div>
            </div>
        </main>
    </div>

    <script>
        // Carregar sidebar (mesmo padrao das outras paginas)
        async function carregarLayout() {
            try {
                const response = await fetch('layout.html');
                const layoutHtml = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(layoutHtml, 'text/html');

                const sidebar = doc.querySelector('.app-sidebar');
                if (sidebar) {
                    document.getElementById('sidebar-placeholder')?.replaceWith(sidebar);
                }

                const scripts = doc.querySelectorAll('script');
                scripts.forEach(script => {
                    if (script.textContent.trim()) {
                        const newScript = document.createElement('script');
                        newScript.textContent = `(function(){${script.textContent}})();`;
                        document.head.appendChild(newScript);
                    }
                });

                // Inicializar AccordionManager apos scripts carregados
                setTimeout(() => {
                    if (window.AccordionManager && !window.AccordionManager._initialized) {
                        window.AccordionManager.init();
                    }
                    if (typeof window.verificarMenuSuperAdmin === 'function') {
                        window.verificarMenuSuperAdmin();
                    }
                }, 150);
            } catch (error) {
                console.error('Erro ao carregar layout:', error);
            }
        }

        // Obter ligaId da URL
        function obterLigaIdUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('liga') || params.get('id');
        }

        // Carregar ligas
        async function carregarLigas() {
            try {
                const response = await fetch('/api/ligas');
                const ligas = await response.json();
                const select = document.getElementById('ligaSelect');

                if (!Array.isArray(ligas) || ligas.length === 0) {
                    select.innerHTML = '<option value="">Nenhuma liga encontrada</option>';
                    return;
                }

                select.innerHTML = '<option value="">-- Selecione uma liga --</option>' +
                    ligas.map(liga => `<option value="${liga._id || liga.id}">${liga.nome}</option>`).join('');

                document.getElementById('btnAudit').disabled = false;

                // Se veio ligaId na URL, selecionar e executar auditoria
                const ligaIdUrl = obterLigaIdUrl();
                if (ligaIdUrl) {
                    select.value = ligaIdUrl;
                    if (select.value === ligaIdUrl) {
                        // Executar auditoria automaticamente
                        setTimeout(() => executarAuditoria(), 300);
                    }
                }
            } catch (error) {
                console.error('Erro ao carregar ligas:', error);
                document.getElementById('ligaSelect').innerHTML = '<option value="">Erro ao carregar</option>';
            }
        }

        // Executar auditoria
        async function executarAuditoria() {
            const ligaId = document.getElementById('ligaSelect').value;
            if (!ligaId) {
                SuperModal.toast.warning('Selecione uma liga primeiro');
                return;
            }

            const resultsDiv = document.getElementById('auditResults');
            resultsDiv.innerHTML = `
                <div class="loading">
                    <span class="material-icons">sync</span>
                    Executando auditoria...
                </div>
            `;

            try {
                const response = await fetch(`/api/admin/auditoria/extratos/${ligaId}?detalhado=true`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message || 'Erro na auditoria');
                }

                renderizarResultados(data, ligaId);
            } catch (error) {
                console.error('Erro na auditoria:', error);
                resultsDiv.innerHTML = `
                    <div class="problem-item">
                        <div class="problem-name">Erro ao executar auditoria</div>
                        <div class="problem-errors">${error.message}</div>
                    </div>
                `;
            }
        }

        // Renderizar resultados
        function renderizarResultados(data, ligaId) {
            const { stats, problemas, status, liga, acertos } = data;

            const statusHtml = status === 'OK'
                ? '<span class="status-badge ok"><span class="material-icons">check_circle</span>Todos OK</span>'
                : '<span class="status-badge error"><span class="material-icons">error</span>Problemas Encontrados</span>';

            let html = `
                <div class="results-header">
                    <h2>${liga.nome}</h2>
                    ${statusHtml}
                </div>

                <div class="stats-grid">
                    <div class="stat-card ok">
                        <div class="stat-value">${stats.ok}</div>
                        <div class="stat-label">OK</div>
                    </div>
                    <div class="stat-card error">
                        <div class="stat-value">${stats.erros}</div>
                        <div class="stat-label">Com Erros</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-value">${stats.semCache}</div>
                        <div class="stat-label">Sem Cache</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.total}</div>
                        <div class="stat-label">Total</div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card ${stats.rodadasIncompletas > 0 ? 'warning' : ''}">
                        <div class="stat-value">${stats.rodadasIncompletas}</div>
                        <div class="stat-label">Rodadas Incompletas</div>
                    </div>
                    <div class="stat-card ${stats.saldoErrado > 0 ? 'error' : ''}">
                        <div class="stat-value">${stats.saldoErrado}</div>
                        <div class="stat-label">Saldo Errado</div>
                    </div>
                    <div class="stat-card ${stats.acumuladoErrado > 0 ? 'error' : ''}">
                        <div class="stat-value">${stats.acumuladoErrado}</div>
                        <div class="stat-label">Acumulado Errado</div>
                    </div>
                    <div class="stat-card ${stats.semTop10 > 0 ? 'warning' : ''}">
                        <div class="stat-value">${stats.semTop10}</div>
                        <div class="stat-label">Sem Top10</div>
                    </div>
                </div>
            `;

            if (problemas && problemas.length > 0) {
                html += `
                    <div class="problems-section">
                        <h3>
                            <span class="material-icons">warning</span>
                            Participantes com Problemas (${problemas.length})
                        </h3>
                        ${problemas.map(p => `
                            <div class="problem-item">
                                <div class="problem-name">${p.nome} (${p.timeId})</div>
                                <ul class="problem-errors">
                                    ${p.erros.map(e => `<li>${e}</li>`).join('')}
                                </ul>
                            </div>
                        `).join('')}
                    </div>
                `;

                // Botao de fix se tiver saldos errados
                if (stats.saldoErrado > 0) {
                    html += `
                        <div class="fix-section">
                            <h3>
                                <span class="material-icons" style="color: var(--color-success);">build</span>
                                Correcao Automatica
                            </h3>
                            <p>Corrige campos t.saldo corrompidos recalculando: bonusOnus + pontosCorridos + mataMata + top10</p>
                            <div class="actions-bar">
                                <button class="btn-audit" onclick="executarFixSaldo('${ligaId}', true)">
                                    <span class="material-icons">preview</span>
                                    Simular (Dry-Run)
                                </button>
                                <button class="btn-audit btn-fix" onclick="executarFixSaldo('${ligaId}', false)">
                                    <span class="material-icons">build</span>
                                    Executar Correcao
                                </button>
                            </div>
                            <div id="fixResults" class="fix-results"></div>
                        </div>
                    `;
                }
            }

            // Acertos financeiros
            html += `
                <div class="acertos-section">
                    <h3>
                        <span class="material-icons" style="color: var(--color-primary);">receipt_long</span>
                        Acertos Financeiros
                    </h3>
                    <p>Total: <strong>${acertos.total}</strong></p>
                    ${Object.entries(acertos.porTipo || {}).map(([tipo, count]) =>
                        `<p>- ${tipo}: <strong>${count}</strong></p>`
                    ).join('')}
                </div>
            `;

            document.getElementById('auditResults').innerHTML = html;
        }

        // Fix de saldo
        async function executarFixSaldo(ligaId, dryRun) {
            const fixResults = document.getElementById('fixResults');
            fixResults.innerHTML = `
                <div class="loading" style="padding: 16px;">
                    <span class="material-icons">sync</span>
                    ${dryRun ? 'Simulando...' : 'Executando correcao...'}
                </div>
            `;

            try {
                const response = await fetch(`/api/admin/auditoria/fix-saldo/${ligaId}?dryRun=${dryRun}`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message || 'Erro ao corrigir');
                }

                const boxClass = dryRun ? 'dry-run' : 'success';
                const statusColor = dryRun ? 'var(--color-warning)' : 'var(--color-success)';

                fixResults.innerHTML = `
                    <div class="fix-result-box ${boxClass}">
                        <p style="color: ${statusColor};">
                            ${dryRun ? 'Simulacao concluida' : 'Correcao aplicada com sucesso!'}
                        </p>
                        <p>Caches corrigidos: <strong>${data.cachesCorrigidos}</strong></p>
                        <p>Transacoes fixadas: <strong>${data.transacoesFixadas}</strong></p>
                    </div>
                `;

                if (!dryRun && data.cachesCorrigidos > 0) {
                    // Reexecutar auditoria apos fix
                    setTimeout(() => executarAuditoria(), 1000);
                }
            } catch (error) {
                console.error('Erro no fix:', error);
                fixResults.innerHTML = `
                    <div class="fix-result-box error">
                        <p style="color: var(--color-danger);">Erro: ${error.message}</p>
                    </div>
                `;
            }
        }

        // ✅ Guards SPA para evitar dupla inicialização
        if (!window.__auditoria_extratos_state) {
            window.__auditoria_extratos_state = {
                initRunning: false,
                spaBound: false,
                eventsBound: false,
                initChecked: false
            };
        }

        // Eventos
        if (!window.__auditoria_extratos_state.eventsBound) {
            window.__auditoria_extratos_state.eventsBound = true;
            document.getElementById('btnAudit').addEventListener('click', executarAuditoria);
            document.getElementById('ligaSelect').addEventListener('change', function() {
                document.getElementById('auditResults').innerHTML = '';
            });
        }

        // Função de inicialização reutilizável
        async function initAuditoriaExtratos() {
            if (window.__auditoria_extratos_state.initRunning) return;
            window.__auditoria_extratos_state.initRunning = true;
            console.log("[AUDITORIA-EXTRATOS] Inicializando página...");
            try {
                await carregarLayout();
                await carregarLigas();
            } finally {
                window.__auditoria_extratos_state.initRunning = false;
            }
        }

        // Inicializar apenas se estamos na página correta
        if (!window.__auditoria_extratos_state.initChecked) {
            window.__auditoria_extratos_state.initChecked = true;
            if (window.location.pathname.includes('auditoria-extratos.html')) {
                initAuditoriaExtratos();
            }
        }

        // ✅ FIX: Reinicializar após navegação SPA
        if (!window.__auditoria_extratos_state.spaBound) {
            window.__auditoria_extratos_state.spaBound = true;
            window.addEventListener('spa:navigated', async (e) => {
                const { pageName } = e.detail || {};
                if (pageName === 'auditoria-extratos.html') {
                    console.log('[AUDITORIA-EXTRATOS] Reinicializando após navegação SPA...');
                    await initAuditoriaExtratos();
                }
            });
        }
    </script>
</body>
</html>
