<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiro Certo - Admin - Super Cartola Manager</title>
    <!-- Design Tokens (SEMPRE PRIMEIRO) -->
    <link rel="stylesheet" href="css/_admin-tokens.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/modules/dashboard-redesign.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Russo+One&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/modules/super-modal.css" />
    <script src="js/super-modal.js"></script>
    <style>
        /* Estilos inline minimos — admin-tiro-certo nao precisa de CSS externo */
        .tc-admin-container { max-width: 900px; margin: 0 auto; padding: var(--app-space-4); }
        .tc-admin-header { display: flex; align-items: center; gap: var(--app-space-3); margin-bottom: var(--app-space-6); }
        .tc-admin-header h1 { font-family: var(--app-font-brand); font-size: 1.5rem; color: white; margin: 0; display: flex; align-items: center; gap: var(--app-space-2); }
        .tc-admin-header p { font-size: var(--app-font-sm); color: var(--app-text-muted); margin: 0.25rem 0 0; }

        .tc-liga-selector { margin-bottom: var(--app-space-6); }
        .tc-liga-selector select { width: 100%; padding: 0.625rem 1rem; background: var(--app-surface); color: white; border: 1px solid var(--app-border); border-radius: var(--app-radius-md); font-size: var(--app-font-sm); }

        .tc-card { background: var(--app-surface); border: 1px solid var(--app-border); border-radius: var(--app-radius-lg); padding: var(--app-space-4); margin-bottom: var(--app-space-4); }
        .tc-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--app-space-3); }
        .tc-card-title { font-family: var(--app-font-brand); font-size: 1rem; color: white; display: flex; align-items: center; gap: var(--app-space-2); }

        .tc-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: var(--app-space-3); margin-bottom: var(--app-space-4); }
        .tc-stat { text-align: center; padding: var(--app-space-3); background: var(--app-bg); border-radius: var(--app-radius-md); }
        .tc-stat-value { font-family: var(--app-font-mono); font-size: 1.5rem; font-weight: 700; color: white; }
        .tc-stat-label { font-size: var(--app-font-xs); color: var(--app-text-muted); margin-top: 0.25rem; }

        .tc-edicao-card { background: var(--app-bg); border: 1px solid var(--app-border); border-radius: var(--app-radius-md); padding: var(--app-space-3); margin-bottom: var(--app-space-2); display: flex; align-items: center; justify-content: space-between; }
        .tc-edicao-info { display: flex; align-items: center; gap: var(--app-space-3); }
        .tc-edicao-nome { font-weight: 600; color: white; font-size: var(--app-font-sm); }
        .tc-edicao-rodadas { font-family: var(--app-font-mono); font-size: var(--app-font-xs); color: var(--app-text-muted); }
        .tc-edicao-status { font-size: var(--app-font-xs); font-weight: 600; padding: 2px 8px; border-radius: 999px; }
        .tc-edicao-status.pendente { background: rgba(234,179,8,0.15); color: var(--app-warning); }
        .tc-edicao-status.em_andamento { background: rgba(34,197,94,0.15); color: var(--app-success); }
        .tc-edicao-status.finalizada { background: rgba(148,163,184,0.15); color: var(--app-text-muted); }

        .tc-participante-row { display: flex; align-items: center; gap: var(--app-space-2); padding: 0.5rem 0; border-bottom: 1px solid var(--app-border); }
        .tc-participante-row:last-child { border-bottom: none; }
        .tc-participante-row img { width: 24px; height: 24px; object-fit: contain; }
        .tc-participante-nome { flex: 1; font-size: var(--app-font-sm); color: white; }
        .tc-participante-status { font-size: var(--app-font-xs); font-weight: 600; }
        .tc-participante-status.vivo { color: var(--app-success); }
        .tc-participante-status.eliminado { color: var(--app-danger); }
        .tc-participante-status.campeao { color: var(--app-warning); }

        .tc-btn { padding: 0.5rem 1rem; border: none; border-radius: var(--app-radius-md); font-size: var(--app-font-sm); font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: var(--app-space-1); transition: opacity 0.2s; }
        .tc-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .tc-btn-primary { background: var(--app-primary); color: white; }
        .tc-btn-primary:hover:not(:disabled) { opacity: 0.9; }

        .tc-form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--app-space-3); margin-bottom: var(--app-space-3); }
        .tc-form-row label { font-size: var(--app-font-xs); color: var(--app-text-muted); display: block; margin-bottom: 0.25rem; }
        .tc-form-row input { width: 100%; padding: 0.5rem; background: var(--app-bg); color: white; border: 1px solid var(--app-border); border-radius: var(--app-radius-md); font-family: var(--app-font-mono); font-size: var(--app-font-sm); }

        .tc-empty { text-align: center; color: var(--app-text-muted); padding: var(--app-space-6); }
        .tc-loading { text-align: center; color: var(--app-text-muted); padding: var(--app-space-4); }
        .tc-loading .material-icons { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Mobile Sidebar Toggle -->
    <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" onclick="toggleMobileSidebar()">
        <span class="material-icons">menu</span>
    </button>

    <div class="admin-page">
        <div id="sidebar-placeholder"></div>
        <main class="main-content">
            <div class="admin-content">
                <div class="tc-admin-container">

                    <!-- Header -->
                    <div class="tc-admin-header">
                        <div>
                            <h1>
                                <span class="material-icons" style="color:var(--app-primary);">gps_fixed</span>
                                Tiro Certo
                            </h1>
                            <p>Gerenciar edicoes e participantes do modo Survival</p>
                        </div>
                    </div>

                    <!-- Seletor de Liga -->
                    <div class="tc-liga-selector">
                        <select id="tcLigaSelect" onchange="window.adminTiroCerto.onLigaChange()">
                            <option value="">Selecione uma liga...</option>
                        </select>
                    </div>

                    <!-- Conteudo principal (carregado via JS) -->
                    <div id="tcAdminContent">
                        <div class="tc-empty">
                            <span class="material-icons" style="font-size:3rem;opacity:0.3;">gps_fixed</span>
                            <p>Selecione uma liga para gerenciar o Tiro Certo</p>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Carregar sidebar do layout -->
    <script>
        async function carregarLayout() {
            try {
                const response = await fetch('layout.html');
                const layoutHtml = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(layoutHtml, 'text/html');
                const sidebar = doc.querySelector('.app-sidebar');
                if (sidebar) {
                    document.getElementById('sidebar-placeholder')?.replaceWith(sidebar);
                }
                const scripts = doc.querySelectorAll('script');
                scripts.forEach(script => {
                    if (script.textContent.trim()) {
                        const newScript = document.createElement('script');
                        newScript.textContent = `(function(){${script.textContent}})();`;
                        document.head.appendChild(newScript);
                    }
                });
                setTimeout(() => {
                    if (typeof window.verificarMenuSuperAdmin === 'function') {
                        window.verificarMenuSuperAdmin();
                    }
                }, 150);
            } catch (error) {
                console.error('Erro ao carregar layout:', error);
            }
        }
        carregarLayout();
    </script>

    <!-- Controller JS -->
    <script src="js/admin/modules/admin-tiro-certo.js"></script>
</body>
</html>
