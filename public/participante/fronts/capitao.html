<!-- PARTICIPANTE CAPITÃO DE LUXO - Interface v2.0 -->
<!-- v2.0: Redesign — alinhado ao padrão visual de Luva de Ouro (gold, flat, sem purple) -->
<div class="capitao-participante">

    <!-- Container para conteúdo dinâmico -->
    <div id="capitaoContent">
        <div class="loading-participante text-center py-10">
            <div class="spinner-capitao"></div>
            <p class="loading-text">Carregando capitães...</p>
        </div>
    </div>
</div>

<style>
    /* Tokens locais mapeados para _app-tokens.css — sem cores hardcoded */
    :root {
        --capitao-font-brand: var(--app-font-brand, 'Russo One', sans-serif);
        --capitao-font-body: 'Inter', -apple-system, sans-serif;
        --capitao-font-mono: 'JetBrains Mono', monospace;
        --capitao-gold: var(--app-gold, #fbbf24);
        --capitao-success: var(--app-success-light, #4ade80);
        --capitao-danger: var(--app-danger, #f87171);
        --capitao-card: var(--app-surface, #1a1a1a);
        --capitao-border: var(--participante-border, #333);
        --capitao-text-muted: #999;
        /* Aliases para retrocompatibilidade com JS existente */
        --capitao-primary: var(--app-gold, #fbbf24);
        --capitao-primary-light: rgba(251, 191, 36, 0.65);
    }

    /* Card genérico (legado — utilizado pelo JS para card de desempenho) */
    .capitao-card {
        background: var(--participante-card, var(--app-surface));
        border: 1px solid var(--capitao-border);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 10px;
        transition: transform 0.2s ease;
    }

    .capitao-card:active { transform: scale(0.98); }

    .capitao-desempenho-card {
        cursor: pointer;
        border-color: var(--capitao-gold) !important;
        background: rgba(255, 215, 0, 0.05) !important;
    }

    @keyframes spin {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .spinner-capitao {
        border: 4px solid var(--app-surface-elevated, #2a2a2a);
        border-top: 4px solid var(--capitao-gold);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
    }

    .loading-text {
        margin-top: 20px;
        color: var(--capitao-text-muted);
    }

    .capitao-participante {
        padding: 10px 0;
        font-family: var(--capitao-font-body);
    }

    /* ============================================================
       RANKING COLAPSÁVEL — padrão Luva de Ouro
       ============================================================ */

    .capitao-ranking-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        cursor: pointer;
        transition: background 0.15s ease;
    }

    .capitao-ranking-row:active {
        background: rgba(255, 215, 0, 0.08) !important;
    }

    .capitao-ranking-row.expanded {
        background: rgba(255, 215, 0, 0.06);
        border-bottom-color: transparent;
    }

    .capitao-ranking-row.podium-1 { border-left: 3px solid var(--capitao-gold); }
    .capitao-ranking-row.podium-2 { border-left: 3px solid var(--app-silver, #c0c0c0); }
    .capitao-ranking-row.podium-3 { border-left: 3px solid var(--app-bronze, #cd7f32); }

    .capitao-ranking-row.meu-time {
        background: rgba(255, 215, 0, 0.06);
        border-left: 3px solid var(--capitao-gold);
    }

    .capitao-posicao {
        font-family: var(--capitao-font-brand);
        font-size: 20px;
        font-weight: 400;
        color: var(--capitao-gold);
        min-width: 36px;
        text-align: center;
    }

    .capitao-escudo {
        width: 30px;
        height: 30px;
        border-radius: 6px;
    }

    .capitao-info {
        flex: 1;
        min-width: 0;
        padding: 0 8px;
    }

    .capitao-nome {
        font-size: 13px;
        font-weight: 600;
        color: var(--app-text-white, var(--app-text-primary));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .capitao-time-nome {
        font-size: 11px;
        color: var(--capitao-text-muted);
    }

    .capitao-stats {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
    }

    .capitao-stat {
        text-align: right;
    }

    .capitao-stat-label {
        display: block;
        font-size: 9px;
        color: var(--capitao-text-muted);
        text-transform: uppercase;
        margin-bottom: 1px;
    }

    .capitao-stat-value {
        display: block;
        font-family: var(--capitao-font-mono);
        font-size: 13px;
        font-weight: 700;
        color: var(--capitao-gold);
    }

    .capitao-stat-value.media {
        font-size: 11px;
        color: var(--capitao-text-muted);
    }

    .capitao-badge-captain {
        font-size: 9px;
        font-weight: 600;
        color: var(--capitao-gold);
        background: rgba(255, 215, 0, 0.12);
        padding: 2px 5px;
        border-radius: 3px;
    }

    .capitao-expand-icon {
        font-size: 18px !important;
        color: #555;
        transition: transform 0.25s ease;
        flex-shrink: 0;
    }

    .capitao-ranking-row.expanded .capitao-expand-icon {
        transform: rotate(180deg);
        color: var(--capitao-gold);
    }

    /* Painel colapsável */
    .capitao-collapse-panel {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
        background: rgba(255, 215, 0, 0.03);
    }

    .capitao-collapse-panel.open {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .capitao-collapse-inner {
        padding: 6px 14px 10px 50px;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .capitao-collapse-rodada {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        padding: 2px 0;
    }

    .capitao-collapse-rodada-badge {
        font-weight: 700;
        font-size: 10px;
        min-width: 26px;
        flex-shrink: 0;
        color: var(--capitao-text-muted);
    }

    .capitao-collapse-rodada-info {
        color: var(--app-text-primary);
        font-size: 10px;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .capitao-collapse-rodada-pts {
        color: var(--capitao-gold);
        font-weight: 700;
        font-size: 10px;
        flex-shrink: 0;
        margin-left: auto;
        font-family: var(--capitao-font-mono);
    }

    .capitao-collapse-vazio {
        color: #555;
        font-size: 10px;
        font-style: italic;
        padding: 4px 0;
    }

    /* ============================================================
       CARD DESEMPENHO COMPACTO (meu time)
       ============================================================ */
    .cap-desemp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .cap-desemp-header-left {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .cap-desemp-title {
        font-family: var(--capitao-font-brand);
        color: var(--app-text-primary, #fff);
        font-size: 13px;
    }

    .cap-desemp-pts-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .cap-desemp-pts {
        font-family: var(--capitao-font-mono);
        font-size: 20px;
        font-weight: 800;
        color: var(--capitao-gold);
    }

    .cap-desemp-pills {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
    }

    .cap-desemp-pill {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 3px 10px;
        font-size: 10px;
        color: var(--capitao-text-muted);
        white-space: nowrap;
    }

    .cap-desemp-pill strong {
        font-family: var(--capitao-font-mono);
        font-weight: 700;
        color: var(--capitao-gold);
    }

    .cap-desemp-pill-success strong {
        color: var(--capitao-success);
    }

    /* Trend indicator */
    .trend-indicator {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        font-family: var(--capitao-font-mono);
        font-size: 10px;
        font-weight: 600;
        white-space: nowrap;
    }

    .trend-indicator .material-icons { font-size: 14px; }
    .trend-up   { color: var(--capitao-success); }
    .trend-down { color: var(--capitao-danger); }
    .trend-flat { color: var(--capitao-text-muted); }

    /* ============================================================
       ESTADOS: vazio, erro, inativo
       ============================================================ */
    .capitao-empty,
    .capitao-error,
    .capitao-modulo-inativo {
        text-align: center;
        padding: 40px 20px;
        color: var(--capitao-text-muted);
    }

    .capitao-empty .material-icons,
    .capitao-modulo-inativo .material-icons {
        font-size: 48px;
        color: #4b5563;
        margin-bottom: 12px;
    }

    .capitao-error { color: var(--capitao-danger); }

    /* ============================================================
       TABELA (fallback desktop)
       ============================================================ */
    .capitao-table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .capitao-table { width: 100%; border-collapse: collapse; }

    .capitao-table th,
    .capitao-table td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid var(--capitao-border, #333);
    }

    .capitao-table th {
        background: rgba(255, 255, 255, 0.03);
        font-weight: 600;
        color: var(--capitao-text-muted);
        font-size: 11px;
        text-transform: uppercase;
    }

    .capitao-table .val-pts   { font-family: var(--capitao-font-mono); font-weight: 700; color: var(--capitao-gold); }
    .capitao-table .val-media { font-family: var(--capitao-font-mono); color: var(--capitao-text-muted); }
    .capitao-table .val-melhor { font-family: var(--capitao-font-mono); color: var(--capitao-success); }
    .capitao-table .val-pior   { font-family: var(--capitao-font-mono); color: var(--capitao-danger); }

    /* Utilitários legados */
    .text-success  { color: var(--capitao-success); }
    .text-danger   { color: var(--capitao-danger); }
    .text-primary  { color: var(--capitao-gold); }
    .fw-bold       { font-weight: 700; }
    .table-primary { background: rgba(255, 215, 0, 0.06); }
    .text-center   { text-align: center; }

    @media (max-width: 768px) {
        .capitao-participante { padding: 10px; }
        .capitao-ranking-row  { padding: 10px 10px; }
        .capitao-stats        { gap: 6px; }
        .capitao-stat-value   { font-size: 12px; }
        .capitao-table th, .capitao-table td { padding: 8px 4px; font-size: 12px; }
    }
</style>
