<!-- RAIO-X DA RODADA - Template v2.0 -->
<!-- Redesign: Premium Dark Sports Analytics -->
<style>
/* ============================================
   RAIO-X DA RODADA v2.0
   Design System: Black & Orange (#FF4500)
   Premium Dark Mode + Glassmorphism + Motion
   ============================================ */

:root {
    --xray-font-brand: var(--app-font-brand, 'Russo One', sans-serif);
    --xray-font-body: 'Inter', -apple-system, sans-serif;
    --xray-font-mono: 'JetBrains Mono', monospace;
    --xray-primary: var(--app-primary, #FF4500);
    --xray-primary-dark: var(--app-primary-dark, #CC3700);
    --xray-primary-glow: rgba(255, 69, 0, 0.25);
    --xray-surface: var(--app-surface, #1a1a1a);
    --xray-surface-elevated: var(--app-surface-elevated, #262626);
    --xray-surface-hover: var(--app-surface-hover, #333);
    --xray-surface-glass: rgba(38, 38, 38, 0.65);
    --xray-success: var(--app-success, #22c55e);
    --xray-danger: var(--app-danger, #ef4444);
    --xray-warning: var(--app-warning, #eab308);
    --xray-info: var(--app-info, #3b82f6);
    --xray-text-muted: var(--app-text-muted, #9ca3af);
    --xray-text-dim: var(--app-text-dim, #6b7280);
    --xray-text-white: var(--app-text-white, #fff);
    --xray-border: rgba(255, 255, 255, 0.08);
    --xray-border-hover: rgba(255, 255, 255, 0.14);
    --xray-gold: var(--app-gold, #ffd700);
}

/* === CONTAINER === */
.xray-container {
    padding: 16px;
    padding-bottom: 180px;
    font-family: var(--xray-font-body);
    max-width: 600px;
    margin: 0 auto;
    position: relative;
}

/* === STAGGERED ENTRY ANIMATIONS === */
@keyframes xray-fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(18px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes xray-spin {
    to { transform: rotate(360deg); }
}

@keyframes xray-shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
}

@keyframes xray-pulseGlow {
    0%, 100% { box-shadow: 0 0 20px rgba(255, 69, 0, 0.15); }
    50% { box-shadow: 0 0 35px rgba(255, 69, 0, 0.3); }
}

@keyframes xray-barGrow {
    from { width: 0; }
}

.xray-anim-section {
    opacity: 0;
    animation: xray-fadeSlideUp 0.5s ease-out forwards;
}

.xray-anim-section:nth-child(1) { animation-delay: 0s; }
.xray-anim-section:nth-child(2) { animation-delay: 0.08s; }
.xray-anim-section:nth-child(3) { animation-delay: 0.16s; }
.xray-anim-section:nth-child(4) { animation-delay: 0.24s; }
.xray-anim-section:nth-child(5) { animation-delay: 0.32s; }
.xray-anim-section:nth-child(6) { animation-delay: 0.40s; }
.xray-anim-section:nth-child(7) { animation-delay: 0.48s; }
.xray-anim-section:nth-child(8) { animation-delay: 0.56s; }
.xray-anim-section:nth-child(9) { animation-delay: 0.64s; }

/* === GLASS CARD BASE === */
.xray-glass {
    background: var(--xray-surface-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--xray-border);
    border-radius: 14px;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

.xray-glass:hover {
    border-color: var(--xray-border-hover);
}

/* === HEADER === */
.xray-header {
    margin-bottom: 20px;
}

.xray-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.xray-header-title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex: 1;
}

.xray-header-title .material-icons {
    font-size: 28px;
    color: var(--xray-primary);
    filter: drop-shadow(0 0 6px var(--xray-primary-glow));
}

.xray-header-title h2 {
    font-family: var(--xray-font-brand);
    font-size: 22px;
    font-weight: 400;
    color: var(--xray-text-white);
    margin: 0;
    letter-spacing: 0.5px;
}

.xray-header-sub {
    font-size: 13px;
    color: var(--xray-text-muted);
    margin-top: 6px;
    text-align: center;
    letter-spacing: 0.3px;
}

/* === REFRESH BUTTON === */
.xray-refresh-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--xray-text-muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    flex-shrink: 0;
    width: 36px;
    height: 36px;
}

.xray-refresh-btn:hover {
    color: var(--xray-primary);
    background: rgba(255, 69, 0, 0.08);
    border-color: rgba(255, 69, 0, 0.2);
}

.xray-refresh-btn .material-icons {
    font-size: 20px;
    transition: transform 0.3s ease;
}

.xray-refresh-btn:hover .material-icons {
    transform: rotate(90deg);
}

.xray-refresh-btn.spinning .material-icons {
    animation: xray-spin 0.7s linear infinite;
}

.xray-refresh-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.xray-header-spacer {
    width: 36px;
    flex-shrink: 0;
}

/* === BACK BUTTON === */
.xray-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--xray-primary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 8px 0;
    margin-bottom: 8px;
    transition: opacity 0.2s;
}

.xray-back-btn:hover {
    opacity: 0.8;
}

.xray-back-btn .material-icons { font-size: 18px; }

/* === SCORE CARD (Hero) === */
.xray-score-card {
    background: radial-gradient(ellipse at 50% 0%, rgba(255, 69, 0, 0.08) 0%, var(--xray-surface-elevated) 70%);
    border: 1px solid var(--xray-border);
    border-radius: 16px;
    padding: 24px 20px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    animation: xray-pulseGlow 4s ease-in-out infinite;
}

.xray-score-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--xray-primary), var(--xray-primary-dark), var(--xray-primary), transparent);
    background-size: 200% 100%;
    animation: xray-shimmer 3s linear infinite;
}

.xray-score-card::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 0;
    right: 0;
    height: 60px;
    background: linear-gradient(180deg, rgba(255, 69, 0, 0.06) 0%, transparent 100%);
    pointer-events: none;
}

.xray-score-pontos {
    font-family: var(--xray-font-mono);
    font-size: 44px;
    font-weight: 700;
    color: var(--xray-text-white);
    line-height: 1;
    text-shadow: 0 0 30px rgba(255, 255, 255, 0.08);
    position: relative;
    z-index: 1;
}

.xray-score-label {
    font-family: var(--xray-font-brand);
    font-size: 11px;
    color: var(--xray-text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 6px;
    position: relative;
    z-index: 1;
}

.xray-score-divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--xray-primary), transparent);
    margin: 16px auto;
    position: relative;
    z-index: 1;
}

.xray-score-meta {
    display: flex;
    justify-content: center;
    gap: 32px;
    position: relative;
    z-index: 1;
}

.xray-score-meta-item {
    text-align: center;
}

.xray-score-meta-value {
    font-family: var(--xray-font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--xray-text-white);
}

.xray-score-meta-label {
    font-size: 9px;
    color: var(--xray-text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
}

.xray-financeiro-positivo { color: var(--xray-success); }
.xray-financeiro-negativo { color: var(--xray-danger); }
.xray-financeiro-neutro { color: var(--xray-text-muted); }

/* === SECTION TITLE === */
.xray-section-title {
    font-family: var(--xray-font-brand);
    font-size: 13px;
    font-weight: 400;
    color: var(--xray-text-white);
    margin: 0 0 14px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.3px;
}

.xray-section-title .material-icons {
    font-size: 18px;
    color: var(--xray-primary);
}

.xray-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--xray-border), transparent);
    margin-left: 8px;
}

/* === COMPARISON BARS === */
.xray-comparison {
    padding: 16px;
    margin-bottom: 16px;
}

.xray-comp-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
}

.xray-comp-row:last-child {
    margin-bottom: 0;
}

.xray-comp-label {
    font-size: 11px;
    color: var(--xray-text-muted);
    min-width: 55px;
    text-align: right;
    font-weight: 500;
}

.xray-comp-bar-track {
    flex: 1;
    height: 22px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
}

.xray-comp-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    min-width: 2px;
    position: relative;
}

.xray-comp-bar-fill.meu {
    background: linear-gradient(90deg, var(--xray-primary-dark), var(--xray-primary));
    box-shadow: 0 0 12px var(--xray-primary-glow);
}

.xray-comp-bar-fill.media {
    background: linear-gradient(90deg, rgba(59, 130, 246, 0.5), rgba(59, 130, 246, 0.7));
}

.xray-comp-bar-fill.melhor {
    background: linear-gradient(90deg, rgba(255, 215, 0, 0.4), rgba(255, 215, 0, 0.65));
}

.xray-comp-value {
    font-family: var(--xray-font-mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--xray-text-white);
    min-width: 48px;
    text-align: right;
}

.xray-comp-diff {
    font-family: var(--xray-font-mono);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    min-width: 40px;
    text-align: center;
}

.xray-comp-diff.positivo {
    background: rgba(34, 197, 94, 0.12);
    color: var(--xray-success);
}

.xray-comp-diff.negativo {
    background: rgba(239, 68, 68, 0.12);
    color: var(--xray-danger);
}

/* === CAPITAO CARD === */
.xray-capitao-card {
    background: linear-gradient(135deg, var(--xray-surface-elevated) 0%, rgba(255, 215, 0, 0.04) 100%);
    border: 1px solid var(--xray-border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.3s;
}

.xray-capitao-card:hover {
    border-color: rgba(255, 215, 0, 0.2);
}

.xray-capitao-badge {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--xray-gold), #b8860b);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(255, 215, 0, 0.2);
}

.xray-capitao-badge .material-icons {
    font-size: 24px;
    color: #1a1a1a;
}

.xray-capitao-info { flex: 1; }

.xray-capitao-nome {
    font-size: 14px;
    font-weight: 600;
    color: var(--xray-text-white);
}

.xray-capitao-pos {
    font-size: 11px;
    color: var(--xray-text-muted);
    margin-top: 1px;
}

.xray-capitao-stats {
    text-align: right;
}

.xray-capitao-pontos {
    font-family: var(--xray-font-mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--xray-gold);
    text-shadow: 0 0 16px rgba(255, 215, 0, 0.15);
}

.xray-capitao-bonus {
    font-size: 10px;
    color: var(--xray-success);
    margin-top: 2px;
}

/* === POSICAO ANALYSIS === */
.xray-posicao-section {
    padding: 16px;
    margin-bottom: 16px;
}

.xray-posicao-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.xray-posicao-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.xray-posicao-badge {
    font-family: var(--xray-font-brand);
    font-size: 11px;
    font-weight: 400;
    padding: 4px 8px;
    border-radius: 6px;
    min-width: 40px;
    text-align: center;
    color: #fff;
}

.xray-posicao-bar-track {
    flex: 1;
    height: 26px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 8px;
    overflow: hidden;
}

.xray-posicao-bar-fill {
    height: 100%;
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding-left: 10px;
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    min-width: 2px;
    position: relative;
}

.xray-posicao-bar-label {
    font-family: var(--xray-font-mono);
    font-size: 10px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
}

.xray-posicao-value {
    font-family: var(--xray-font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--xray-text-white);
    min-width: 50px;
    text-align: right;
}

/* === ATLETAS TABLE === */
.xray-atletas-section {
    padding: 16px;
    margin-bottom: 16px;
}

.xray-atleta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

.xray-atleta-row:last-child { border-bottom: none; }

.xray-atleta-pos-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 4px;
    color: #fff;
    min-width: 32px;
    text-align: center;
    flex-shrink: 0;
}

.xray-atleta-info { flex: 1; min-width: 0; }

.xray-atleta-nome {
    font-size: 13px;
    font-weight: 600;
    color: var(--xray-text-white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 4px;
}

.xray-atleta-clube-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    flex-shrink: 0;
}

.xray-atleta-sub {
    font-size: 10px;
    color: var(--xray-text-dim);
}

.xray-atleta-pontos {
    font-family: var(--xray-font-mono);
    font-size: 14px;
    font-weight: 700;
    min-width: 50px;
    text-align: right;
}

.xray-atleta-pontos.positivo { color: var(--xray-success); }
.xray-atleta-pontos.negativo { color: var(--xray-danger); }
.xray-atleta-pontos.neutro { color: var(--xray-text-muted); }

.xray-capitao-tag {
    font-size: 9px;
    background: var(--xray-gold);
    color: #1a1a1a;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 700;
    flex-shrink: 0;
}

.xray-reserva-tag {
    font-size: 9px;
    background: rgba(107, 114, 128, 0.3);
    color: var(--xray-text-dim);
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
}

/* === DISTRIBUICAO (HISTOGRAMA) === */
.xray-distrib-section {
    padding: 16px;
    margin-bottom: 16px;
}

.xray-distrib-bars {
    display: flex;
    align-items: flex-end;
    gap: 5px;
    height: 100px;
    margin-top: 12px;
}

.xray-distrib-bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
}

.xray-distrib-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    transition: height 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    min-height: 4px;
}

.xray-distrib-bar.normal {
    background: rgba(255, 255, 255, 0.1);
}

.xray-distrib-bar.destaque {
    background: linear-gradient(180deg, var(--xray-primary), var(--xray-primary-dark));
    box-shadow: 0 0 10px var(--xray-primary-glow);
}

.xray-distrib-count {
    font-family: var(--xray-font-mono);
    font-size: 10px;
    color: var(--xray-text-muted);
}

.xray-distrib-label {
    font-size: 8px;
    color: var(--xray-text-dim);
    text-align: center;
    word-break: break-all;
    letter-spacing: -0.3px;
}

/* === PERFORMANCE GERAL === */
.xray-perf-section {
    padding: 16px;
    margin-bottom: 16px;
}

.xray-perf-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.xray-perf-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--xray-border);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}

.xray-perf-card:hover {
    transform: translateY(-2px);
    border-color: var(--xray-border-hover);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
}

.xray-perf-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
}

.xray-perf-card.mod-capitao::before { background: var(--module-capitao-primary, #8b5cf6); }
.xray-perf-card.mod-artilheiro::before { background: var(--module-artilheiro-primary, #22c55e); }
.xray-perf-card.mod-luva::before { background: var(--module-luva-primary, #ffd700); }
.xray-perf-card.mod-top10::before { background: var(--xray-primary); }

/* Subtle module-specific background glow */
.xray-perf-card.mod-capitao { background: linear-gradient(135deg, rgba(139, 92, 246, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%); }
.xray-perf-card.mod-artilheiro { background: linear-gradient(135deg, rgba(34, 197, 94, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%); }
.xray-perf-card.mod-luva { background: linear-gradient(135deg, rgba(255, 215, 0, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%); }
.xray-perf-card.mod-top10 { background: linear-gradient(135deg, rgba(255, 69, 0, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%); }

.xray-perf-icon {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.05);
}

.xray-perf-icon .material-icons {
    font-size: 20px;
}

.xray-perf-info {
    flex: 1;
    min-width: 0;
}

.xray-perf-title {
    font-family: var(--xray-font-brand);
    font-size: 9px;
    font-weight: 400;
    color: var(--xray-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.xray-perf-value {
    font-family: var(--xray-font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--xray-text-white);
    line-height: 1.2;
}

.xray-perf-sub {
    font-size: 10px;
    color: var(--xray-text-dim);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.xray-perf-card.mod-capitao .xray-perf-value { color: var(--module-capitao-primary, #8b5cf6); }
.xray-perf-card.mod-artilheiro .xray-perf-value { color: var(--module-artilheiro-primary, #22c55e); }
.xray-perf-card.mod-luva .xray-perf-value { color: var(--module-luva-primary, #ffd700); }
.xray-perf-card.mod-top10 .xray-perf-value { color: var(--xray-primary); }

/* === UPCOMING SECTION === */
.xray-upcoming-section {
    padding: 16px;
    margin-bottom: 16px;
}

.xray-upcoming-lista {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.xray-upcoming-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--xray-border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s ease;
}
