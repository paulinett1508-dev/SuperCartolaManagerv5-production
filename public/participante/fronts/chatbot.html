<!-- BIG CARTOLA IA — Chatbot v3.0 -->
<div id="chatbot-container" class="chatbot-container">

    <!-- Header Strip -->
    <div class="chatbot-header">
        <span class="material-icons chatbot-header-icon">auto_awesome</span>
        <div class="chatbot-header-text">
            <h1 class="chatbot-header-title">Big Cartola IA</h1>
            <p class="chatbot-header-status" id="chatbot-status">Pronto para ajudar</p>
        </div>
        <button id="chatbot-conversations" class="chatbot-icon-btn" aria-label="Ver conversas" title="Ver conversas">
            <span class="material-icons">forum</span>
        </button>
        <button id="chatbot-new" class="chatbot-icon-btn" aria-label="Nova conversa" title="Nova conversa">
            <span class="material-icons">add_comment</span>
        </button>
        <button id="chatbot-clear" class="chatbot-icon-btn" aria-label="Limpar conversa" title="Limpar conversa">
            <span class="material-icons">delete_sweep</span>
        </button>
    </div>

    <!-- Painel lateral de conversas -->
    <div class="chatbot-conversations-panel" id="chatbot-conversations-panel" style="display:none">
        <div class="chatbot-conv-panel-header">
            <span class="chatbot-conv-panel-title">Conversas</span>
            <button id="chatbot-conv-close" class="chatbot-icon-btn" aria-label="Fechar" title="Fechar">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div id="chatbot-conv-list" class="chatbot-conv-list">
            <!-- Renderizado via JS -->
        </div>
    </div>

    <!-- Mensagens -->
    <div class="chatbot-messages" id="chatbot-messages">
        <!-- Mensagem de boas-vindas (renderizada via JS) -->
    </div>

    <!-- Sugestoes rapidas -->
    <div class="chatbot-suggestions" id="chatbot-suggestions">
        <button class="chatbot-suggestion-chip" data-pergunta="Quem lidera o ranking geral?">Ranking Geral</button>
        <button class="chatbot-suggestion-chip" data-pergunta="Como funciona o mata-mata?">Mata-Mata</button>
        <button class="chatbot-suggestion-chip" data-pergunta="Quais modulos estao ativos na minha liga?">Modulos Ativos</button>
        <button class="chatbot-suggestion-chip" data-pergunta="Em qual rodada estamos?">Rodada Atual</button>
    </div>

    <!-- Input area -->
    <div class="chatbot-input-area">
        <input
            type="text"
            id="chatbot-input"
            class="chatbot-input"
            placeholder="Pergunte algo sobre o app..."
            maxlength="500"
            autocomplete="off"
        >
        <button id="chatbot-send" class="chatbot-send-btn" aria-label="Enviar pergunta">
            <span class="material-icons">send</span>
        </button>
    </div>
</div>
