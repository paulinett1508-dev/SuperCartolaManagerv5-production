<!-- PARTICIPANTE ARTILHEIRO - Interface v4.1 LP -->
<!-- v4.1: Landing page sections (Hero, Meu Status, Destaque, Acordeons) -->
<div class="artilheiro-participante">

    <!-- ============================================================
         LP SECTIONS — Hero, Meu Status, Destaque, Accordions
         ============================================================ -->
    <div class="module-lp module-lp-artilheiro" id="artilheiro-lp-wrapper">

        <!-- HERO -->
        <div class="module-lp-hero">
            <div class="module-lp-hero-icon-wrap">
                <span class="material-icons">sports_soccer</span>
            </div>
            <h1 class="module-lp-hero-title">Artilheiro Campeão</h1>
            <p class="module-lp-hero-tagline">O maior goleador da liga</p>
        </div>

        <!-- MEU STATUS (populated by JS after data loads) -->
        <div id="lp-meu-status-artilheiro" class="module-lp-meu-status" style="display:none"></div>

        <!-- DESTAQUE TOP 3 (populated by JS) -->
        <div id="lp-destaque-artilheiro" class="module-lp-destaque" style="display:none"></div>

        <!-- ACCORDION: Como Funciona -->
        <div class="module-lp-accordion">
            <button class="module-lp-accordion-btn" aria-expanded="false" id="btn-accordion-regras-artilheiro">
                <div class="module-lp-accordion-btn-inner">
                    <span class="material-icons">menu_book</span>
                    <span class="module-lp-accordion-btn-label">Como Funciona</span>
                </div>
                <span class="material-icons module-lp-accordion-chevron">expand_more</span>
            </button>
            <div class="module-lp-accordion-body">
                <div class="module-lp-accordion-inner">
                    <div id="lp-regras-body-artilheiro" class="module-lp-regras-dynamic">
                        <p style="color:var(--app-text-muted);font-size:var(--app-font-sm);text-align:center;">Carregando regras...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ACCORDION: Premiações (hidden until JS loads data) -->
        <div class="module-lp-accordion" id="lp-premiacoes-accordion-artilheiro" style="display:none">
            <button class="module-lp-accordion-btn" aria-expanded="false" id="btn-accordion-premiacoes-artilheiro">
                <div class="module-lp-accordion-btn-inner">
                    <span class="material-icons">emoji_events</span>
                    <span class="module-lp-accordion-btn-label">Premiações</span>
                </div>
                <span class="material-icons module-lp-accordion-chevron">expand_more</span>
            </button>
            <div class="module-lp-accordion-body">
                <div class="module-lp-accordion-inner">
                    <div id="lp-premiacoes-body-artilheiro" class="module-lp-premiacoes-grid"></div>
                </div>
            </div>
        </div>

    </div><!-- /module-lp-artilheiro -->

    <!-- DIVIDER between LP and data section -->
    <div class="module-lp-divider module-lp-artilheiro"></div>

    <!-- Container para conteúdo dinâmico (skeleton será injetado via JS) -->
    <div id="artilheiro-content">
        <!-- Loading State -->
        <div id="artilheiroLoading" class="loading-participante text-center py-10">
            <div class="spinner-artilheiro"></div>
            <p class="loading-text">Carregando artilheiros...</p>
        </div>

        <!-- Empty State -->
        <div id="artilheiroEmpty" style="display: none; text-align: center; padding: 60px 20px;">
            <span class="material-symbols-outlined" style="font-size: 64px; color: var(--app-text-disabled, #404040); margin-bottom: 16px; display: block;">military_tech</span>
            <h3 style="color: var(--app-text-muted); font-size: 18px; margin-bottom: 8px;">Nenhum artilheiro registrado</h3>
            <p style="color: var(--app-text-dim); font-size: 14px;">Os dados aparecerão quando houver gols na temporada</p>
        </div>

        <!-- Error State -->
        <div id="artilheiroError" style="display: none; text-align: center; padding: 60px 20px;">
            <span class="material-symbols-outlined" style="font-size: 64px; color: var(--app-warning); margin-bottom: 16px; display: block;">warning</span>
            <h3 style="color: var(--app-text-muted); font-size: 18px; margin-bottom: 8px;">Erro ao carregar artilheiros</h3>
            <p id="artilheiroErrorMsg" style="color: var(--app-text-dim); font-size: 13px; margin-bottom: 20px;">Tente novamente em instantes</p>
            <button onclick="window.participanteNav?.navegarPara('artilheiro', true)"
                    style="padding: 10px 20px; background: var(--app-gradient-primary); color: var(--app-text-primary); border: none; border-radius: var(--app-radius-md); font-weight: 600; cursor: pointer;">
                <span class="material-symbols-outlined" style="font-size: 16px; vertical-align: middle; margin-right: 4px;">refresh</span>
                Tentar novamente
            </button>
        </div>
    </div>

</div>

<style>
    /* Cores mapeadas para tokens globais (_app-tokens.css)
       Fonts loaded from parent index.html */

    :root {
        --artilheiro-font-brand: var(--app-font-brand, 'Russo One', sans-serif);
        --artilheiro-font-body: 'Inter', -apple-system, sans-serif;
        --artilheiro-primary: var(--app-success-light, var(--app-success-light));
        --artilheiro-card: var(--app-surface, var(--app-surface));
        --artilheiro-border: var(--participante-border, #333);
        --artilheiro-danger: var(--app-danger, var(--app-danger));
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }
        100% {
            transform: rotate(360deg);
        }
    }

    /* Spinner usando variáveis CSS (sem cores hardcoded) */
    .spinner-artilheiro {
        border: 4px solid var(--app-surface-elevated, #2a2a2a);
        border-top: 4px solid var(--artilheiro-primary);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
    }

    .loading-text {
        margin-top: 20px;
        color: var(--app-text-muted, #888);
    }

    .artilheiro-participante {
        padding: 10px 0;
        font-family: var(--artilheiro-font-body);
    }

    .artilheiro-card {
        background: var(--participante-card, var(--app-surface));
        border: 1px solid var(--participante-border, #333);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 10px;
    }

    .table-responsive {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid var(--participante-border, #333);
    }

    th {
        background: var(--module-artilheiro-muted, rgba(34, 197, 94, 0.1));
        font-weight: 600;
    }

    .text-success {
        color: var(--artilheiro-primary);
    }
    .text-danger {
        color: var(--artilheiro-danger);
    }
    .text-primary {
        color: var(--participante-primary, var(--app-success-light));
    }
    .fw-bold {
        font-weight: 700;
    }
    .table-primary {
        background: var(--module-artilheiro-muted, rgba(34, 197, 94, 0.15));
    }
    .text-center {
        text-align: center;
    }

    @media (max-width: 768px) {
        .artilheiro-participante {
            padding: 10px;
        }
        th,
        td {
            padding: 8px 4px;
            font-size: 14px;
        }
    }
</style>
