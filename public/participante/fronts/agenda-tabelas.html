<!-- AGENDA E TABELAS - Tela dedicada para Jogos do Dia + Tabela Brasileirao -->
<div id="agenda-tabelas-container" class="px-4 pt-2 pb-28">
    <!-- Botão voltar compacto -->
    <button onclick="window.participanteNav && window.participanteNav.navegarPara('home')"
            class="flex items-center gap-1 mb-2 py-1 px-0 bg-transparent border-none cursor-pointer"
            style="-webkit-tap-highlight-color: transparent;">
        <span class="material-icons" style="font-size:18px; color: var(--app-text-muted);">arrow_back</span>
        <span style="font-size: 11px; color: var(--app-text-muted);">Início</span>
    </button>

    <!-- Jogos do Dia (Agenda) -->
    <div id="agenda-jogos-container" class="mb-6">
        <div class="flex flex-col items-center justify-center py-10">
            <div class="w-10 h-10 border-4 border-zinc-700 border-t-orange-500 rounded-full animate-spin mb-4"></div>
            <p class="text-sm text-gray-400">Carregando jogos do dia...</p>
        </div>
    </div>

    <!-- Tabela do Brasileirao -->
    <div id="agenda-brasileirao-container">
        <div class="flex flex-col items-center justify-center py-10">
            <div class="w-8 h-8 border-3 border-zinc-700 border-t-orange-500 rounded-full animate-spin mb-4"></div>
            <p class="text-sm text-gray-400">Carregando tabela...</p>
        </div>
    </div>
</div>
