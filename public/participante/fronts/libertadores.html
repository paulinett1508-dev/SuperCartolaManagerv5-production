<!-- LIBERTADORES 2026 - Tela dedicada -->
<div id="libertadores-container" class="p-4 pb-28">
    <!-- Header com botao voltar -->
    <div class="flex items-center gap-3 mb-4">
        <button onclick="window.quickAccessBar ? window.quickAccessBar.abrirMenu() : history.back()"
                class="w-9 h-9 rounded-xl flex items-center justify-center"
                style="background: var(--app-glass-bg); border: 1px solid var(--app-glass-border);">
            <span class="material-icons" style="font-size:20px; color: var(--app-text-muted);">arrow_back</span>
        </button>
        <div>
            <h1 style="font-family: 'Russo One', sans-serif; font-size: 16px; color: white; letter-spacing: 0.3px;">
                Libertadores 2026
            </h1>
            <p style="font-size: 10px; color: var(--app-text-dim);">
                Noticias e resultados da Libertadores
            </p>
        </div>
    </div>

    <!-- Container de noticias da Libertadores -->
    <div id="libertadores-noticias-container">
        <div class="flex flex-col items-center justify-center py-16">
            <div class="w-10 h-10 border-4 border-zinc-700 border-t-orange-500 rounded-full animate-spin mb-4"></div>
            <p class="text-sm text-gray-400">Carregando noticias da Libertadores...</p>
        </div>
    </div>
</div>

<script type="module">
    (async function() {
        try {
            const mod = await import('/participante/js/modules/participante-jogos.js');
            const container = document.getElementById('libertadores-noticias-container');
            if (!container) return;

            // Renderizar com fallback estatico imediato
            container.innerHTML = mod.renderizarSecaoLibertadores(null);

            // Buscar noticias reais via API
            const res = await fetch('/api/noticias/libertadores');
            if (res.ok) {
                const data = await res.json();
                if (data && data.success && data.noticias && data.noticias.length > 0) {
                    container.innerHTML = mod.renderizarSecaoLibertadores(data.noticias);
                }
            }
        } catch (err) {
            if (window.Log) Log.warn("LIBERTADORES", "Erro:", err);
            const container = document.getElementById('libertadores-noticias-container');
            if (container) {
                container.innerHTML = `
                    <div class="text-center py-16">
                        <span class="material-icons text-4xl" style="color: var(--app-text-dim);">emoji_events</span>
                        <p class="text-gray-400 mt-3 text-sm">Erro ao carregar noticias</p>
                    </div>
                `;
            }
        }
    })();
</script>
