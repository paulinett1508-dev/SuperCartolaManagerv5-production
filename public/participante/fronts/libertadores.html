<!-- LIBERTADORES 2026 - Landing Page / Hub -->
<!-- Fragmento HTML para inserção via navegação SPA -->
<div id="libertadores-container" class="liberta-page">

    <!-- Botão Voltar -->
    <button
        onclick="window.quickAccessBar ? window.quickAccessBar.abrirMenu() : history.back()"
        class="liberta-btn-voltar"
        aria-label="Voltar">
        <span class="material-icons">arrow_back</span>
    </button>

    <!-- ═══════════════════════════════════════════════════
         HERO / COUNTDOWN
         ═══════════════════════════════════════════════════ -->
    <section class="liberta-hero">
        <!-- Accent bar verde → dourado -->
        <div class="liberta-flag-accent"></div>

        <div class="liberta-hero-content">
            <!-- Troféu -->
            <div class="liberta-hero-trophy">🏆</div>

            <h1 class="liberta-hero-title">Libertadores</h1>
            <p class="liberta-hero-subtitle">2026</p>
            <p class="liberta-hero-local">CONMEBOL Libertadores da América</p>

            <!-- Countdown para a Final -->
            <div class="liberta-countdown">
                <div class="liberta-countdown-item">
                    <span id="liberta-countdown-dias" class="liberta-countdown-value">---</span>
                    <span class="liberta-countdown-label">Dias</span>
                </div>
                <div class="liberta-countdown-item">
                    <span id="liberta-countdown-horas" class="liberta-countdown-value">--</span>
                    <span class="liberta-countdown-label">Horas</span>
                </div>
                <div class="liberta-countdown-item">
                    <span id="liberta-countdown-min" class="liberta-countdown-value">--</span>
                    <span class="liberta-countdown-label">Mins</span>
                </div>
            </div>

            <p class="liberta-hero-info">
                <span class="material-icons">event_available</span>
                Final estimada: Novembro 2026
            </p>
        </div>
    </section>

    <!-- ═══════════════════════════════════════════════════
         STATS STRIP — Formato da competição
         ═══════════════════════════════════════════════════ -->
    <div class="liberta-stats-strip">
        <div class="liberta-stat-item">
            <span class="liberta-stat-value">32</span>
            <span class="liberta-stat-label">Clubes</span>
        </div>
        <div class="liberta-stat-item">
            <span class="liberta-stat-value">10</span>
            <span class="liberta-stat-label">Países</span>
        </div>
        <div class="liberta-stat-item">
            <span class="liberta-stat-value">8</span>
            <span class="liberta-stat-label">Grupos</span>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════
         NOTÍCIAS
         ═══════════════════════════════════════════════════ -->
    <section class="liberta-section">
        <div class="liberta-section-header">
            <span class="liberta-section-icon"><span class="material-icons">newspaper</span></span>
            <h2 class="liberta-section-title">Notícias</h2>
        </div>
        <div id="liberta-noticias-lista" class="liberta-noticias-lista">
            <div class="liberta-loading-placeholder">Carregando notícias...</div>
        </div>
    </section>

    <!-- ═══════════════════════════════════════════════════
         FASES DA COMPETIÇÃO — Timeline
         ═══════════════════════════════════════════════════ -->
    <section class="liberta-section">
        <div class="liberta-section-header">
            <span class="liberta-section-icon"><span class="material-icons">military_tech</span></span>
            <h2 class="liberta-section-title">Fases da Competição</h2>
            <span class="liberta-section-badge">5 fases</span>
        </div>
        <div id="liberta-timeline" class="liberta-timeline">
            <!-- Preenchido via JS -->
        </div>
    </section>

    <!-- Bottom padding para bottom nav -->
    <div class="pb-24"></div>
</div>

<link rel="stylesheet" href="/participante/css/libertadores-lp.css">
