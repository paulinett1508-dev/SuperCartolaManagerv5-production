<!-- LIBERTADORES 2026 - Landing Page / Hub -->
<!-- Fragmento HTML para inserção via navegação SPA -->
<div id="libertadores-container" class="liberta-page">

    <!-- Botão Voltar -->
    <button
        onclick="window.quickAccessBar ? window.quickAccessBar.abrirMenu() : history.back()"
        class="liberta-btn-voltar"
        aria-label="Voltar">
        <span class="material-icons">arrow_back</span>
    </button>

    <!-- ═══════════════════════════════════════════════════
         HERO
         ═══════════════════════════════════════════════════ -->
    <section class="liberta-hero">
        <!-- Accent bar verde → dourado -->
        <div class="liberta-flag-accent"></div>

        <div class="liberta-hero-content">
            <div class="liberta-hero-trophy"><span class="material-icons">emoji_events</span></div>
            <h1 class="liberta-hero-title">Libertadores</h1>
            <p class="liberta-hero-subtitle">2026</p>
            <p class="liberta-hero-local">CONMEBOL Libertadores da América</p>
        </div>
    </section>

    <!-- ═══════════════════════════════════════════════════
         GRUPOS (collapsible)
         ═══════════════════════════════════════════════════ -->
    <section class="liberta-section">
        <button class="liberta-section-header liberta-grupos-toggle" id="liberta-grupos-toggle" aria-expanded="false" aria-controls="liberta-grupos-body">
            <span class="liberta-section-icon"><span class="material-icons">grid_view</span></span>
            <h2 class="liberta-section-title">Grupos Definidos</h2>
            <span class="liberta-section-badge">sorteio 19/mar</span>
            <span class="liberta-grupos-chevron material-icons">expand_more</span>
        </button>
        <div id="liberta-grupos-body" class="liberta-grupos-body liberta-grupos-body--collapsed">
            <p class="liberta-grupos-chamada">Seu time caiu no grupo da morte?</p>
            <div id="liberta-grupos-grid" class="liberta-grupos-grid">
                <!-- Preenchido via JS -->
            </div>
        </div>
    </section>

    <!-- ═══════════════════════════════════════════════════
         TABELA DE JOGOS
         ═══════════════════════════════════════════════════ -->
    <section class="liberta-section" id="liberta-jogos-section">
        <div class="liberta-section-header">
            <span class="liberta-section-icon"><span class="material-icons">sports_soccer</span></span>
            <h2 class="liberta-section-title">Jogos</h2>
        </div>
        <div id="liberta-jogos-container" class="liberta-jogos-container">
            <div class="liberta-loading-placeholder">Carregando jogos...</div>
        </div>
    </section>

    <!-- Bottom padding para bottom nav -->
    <div class="pb-24"></div>
</div>

<link rel="stylesheet" href="/participante/css/libertadores-lp.css?v=5">
