<!-- PARTICIPANTE HOME - Tiles Edition v4.0 -->
<div id="home-container" class="home-tiles-container">

    <!-- Header -->
    <div class="home-tiles-header">
        <span class="home-tiles-header-title">O que tá rolando?</span>
        <span id="tile-atualizado" class="home-tiles-header-time">--</span>
    </div>

    <!-- Grid de Tiles -->
    <div class="home-tiles-grid">

        <!-- TILE: Minha Rodada (2x2) -->
        <button class="home-tile home-tile--confronto"
                aria-label="Ver minha pontuação na rodada"
                onclick="window.participanteNav?.navegarPara('rodadas')">
            <div class="home-tile-tag">MINHA RODADA</div>
            <div class="home-tile-live-badge" id="tile-confronto-live-badge" style="display:none" aria-hidden="true">
                <span class="material-icons" style="font-size:8px;vertical-align:middle">circle</span>
                AO VIVO
            </div>
            <span class="material-icons home-tile-icon-bg">sports_soccer</span>
            <div class="home-tile-body">
                <span id="tile-confronto-pts" class="home-tile-number">--</span>
                <span class="home-tile-label">pts esta rodada</span>
            </div>
        </button>

        <!-- TILE: Ranking Geral (2x2) -->
        <button class="home-tile home-tile--ranking"
                aria-label="Ver ranking geral da liga"
                onclick="window.participanteNav?.navegarPara('ranking')">
            <div class="home-tile-tag">RANKING GERAL</div>
            <span class="material-icons home-tile-icon-bg">leaderboard</span>
            <div class="home-tile-body">
                <span id="tile-ranking-pos" class="home-tile-number">--</span>
                <span class="home-tile-label">sua posição</span>
                <div class="home-tile-ranking-lider">
                    <img id="tile-ranking-img" src="" alt="escudo líder"
                         style="display:none" onerror="this.style.display='none'">
                    <span id="tile-ranking-lider-nome" class="home-tile-lider-nome">--</span>
                    <span id="tile-ranking-lider-pts" class="home-tile-lider-pts">-- pts</span>
                </div>
            </div>
        </button>

        <!-- ROW 3: Tiles opcionais (módulos ativos) — JS controla visibilidade -->
        <div id="home-tiles-optional-row" class="home-tiles-optional-row" style="display:none">

            <!-- TILE: Capitão de Luxo (largura 2x) -->
            <button class="home-tile home-tile--capitao home-tile-opcional"
                    id="tile-capitao"
                    aria-label="Ver Capitão de Luxo"
                    onclick="window.participanteNav?.navegarPara('capitao')">
                <div class="home-tile-tag">CAPITÃO DE LUXO</div>
                <span class="material-icons home-tile-icon-bg" style="font-size:52px">shield</span>
                <div class="home-tile-body">
                    <span id="tile-capitao-nome" class="home-tile-label-val">--</span>
                    <span id="tile-capitao-pts" class="home-tile-number-sm">-- pts</span>
                </div>
            </button>

            <!-- TILE: Mata-Mata (largura 1x) -->
            <button class="home-tile home-tile--mata-mata home-tile-opcional"
                    id="tile-mata-mata"
                    aria-label="Ver Mata-Mata"
                    onclick="window.participanteNav?.navegarPara('mata-mata')">
                <span class="material-icons home-tile-icon-bg" style="font-size:52px">emoji_events</span>
                <div class="home-tile-body">
                    <span id="tile-mata-mata-fase" class="home-tile-label-sm">MATA-MATA</span>
                </div>
            </button>

            <!-- TILE: Artilheiro (largura 1x) -->
            <button class="home-tile home-tile--artilheiro home-tile-opcional"
                    id="tile-artilheiro"
                    aria-label="Ver Artilheiro Campeão"
                    onclick="window.participanteNav?.navegarPara('artilheiro')">
                <span class="material-icons home-tile-icon-bg" style="font-size:52px">military_tech</span>
                <div class="home-tile-body">
                    <span id="tile-artilheiro-gols" class="home-tile-number-sm">--</span>
                    <span class="home-tile-label-sm">ARTILHEIRO</span>
                </div>
            </button>

        </div>

        <!-- TILE: Confrontos da Rodada (1x1) -->
        <button class="home-tile home-tile--confrontos"
                aria-label="Ver confrontos da rodada"
                onclick="window.participanteNav?.navegarPara('rodadas')">
            <span class="material-icons home-tile-icon-bg" style="font-size:52px">groups</span>
            <div class="home-tile-body">
                <span class="material-icons" style="font-size:20px;color:rgba(255,255,255,0.5);margin-bottom:2px">groups</span>
                <span class="home-tile-label-sm">CONFRONTOS</span>
            </div>
        </button>

        <!-- TILE: Ver Tudo (3x1) -->
        <button class="home-tile home-tile--ver-tudo"
                aria-label="Ver todos os módulos"
                onclick="window.participanteNav?.navegarPara('ranking')">
            <div class="home-tile-body home-tile-body--row">
                <span class="material-icons" style="font-size:18px;color:rgba(255,255,255,0.5)">apps</span>
                <span class="home-tile-label-sm" style="flex:1;text-align:center">VER TODOS OS MÓDULOS</span>
                <span class="material-icons" style="font-size:18px;color:rgba(255,255,255,0.35)">chevron_right</span>
            </div>
        </button>

    </div>

</div>
