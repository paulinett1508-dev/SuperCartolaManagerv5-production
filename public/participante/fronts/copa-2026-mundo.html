<!-- COPA DO MUNDO 2026 - Landing Page / Hub -->
<!-- Fragmento HTML para inserção via navegação SPA -->
<div id="copa-2026-mundo-container" class="copa-mundo-page">

    <!-- Botão Voltar -->
    <button
        onclick="window.quickAccessBar ? window.quickAccessBar.abrirMenu() : history.back()"
        class="copa-btn-voltar"
        aria-label="Voltar">
        <span class="material-icons">arrow_back</span>
    </button>

    <!-- ═══════════════════════════════════════════════════
         HERO / COUNTDOWN
         ═══════════════════════════════════════════════════ -->
    <section class="copa-hero">
        <!-- Flag accent bar (USA/Mexico/Canada tri-color) -->
        <div class="copa-flag-accent"></div>

        <div class="copa-hero-content">
            <!-- Host country flags -->
            <div class="copa-hero-flags">
                <span class="copa-host-flag">🇺🇸</span>
                <span class="copa-host-flag">🇲🇽</span>
                <span class="copa-host-flag">🇨🇦</span>
            </div>

            <h1 class="copa-hero-title">Copa do Mundo</h1>
            <p class="copa-hero-subtitle">2026</p>
            <p class="copa-hero-local">Estados Unidos, Mexico & Canada</p>

            <!-- Countdown grid -->
            <div id="copa-countdown" class="copa-countdown">
                <div class="copa-countdown-item">
                    <span id="copa-countdown-dias" class="copa-countdown-value">---</span>
                    <span class="copa-countdown-label">Dias</span>
                </div>
                <div class="copa-countdown-item">
                    <span id="copa-countdown-horas" class="copa-countdown-value">--</span>
                    <span class="copa-countdown-label">Horas</span>
                </div>
                <div class="copa-countdown-item">
                    <span id="copa-countdown-min" class="copa-countdown-value">--</span>
                    <span class="copa-countdown-label">Mins</span>
                </div>
            </div>

            <p class="copa-hero-abertura">
                <span class="material-icons">event_available</span>
                Abertura: 11 de Junho &bull; MetLife Stadium
            </p>
        </div>
    </section>

    <!-- ═══════════════════════════════════════════════════
         TABELA DE GRUPOS — Toggle Jogos / Classificacao
         ═══════════════════════════════════════════════════ -->
    <section class="copa-section" id="copa-grupos-section">
        <div class="copa-section-header">
            <span class="copa-section-icon"><span class="material-icons">emoji_events</span></span>
            <h2 class="copa-section-title">Fase de Grupos</h2>
            <span class="copa-section-badge">12 grupos &bull; 48 seleções</span>
        </div>

        <!-- Toggle: Jogos vs Classificacao -->
        <div class="copa-view-toggle" id="copa-grupos-toggle">
            <button class="copa-view-toggle-btn copa-view-toggle-btn--active" data-view="jogos">Jogos</button>
            <button class="copa-view-toggle-btn" data-view="classificacao">Classificação</button>
        </div>

        <!-- View: Jogos (accordion existente) -->
        <div id="copa-grupos-container" class="copa-grupos-container">
            <div class="copa-loading-placeholder">Carregando grupos...</div>
        </div>

        <!-- View: Classificacao (standings cards) -->
        <div id="copa-standings-container" class="copa-standings-container" style="display:none;">
            <div class="copa-loading-placeholder">Carregando classificacao...</div>
        </div>
    </section>

    <!-- ═══════════════════════════════════════════════════
         FASE ELIMINATÓRIA (Timeline)
         ═══════════════════════════════════════════════════ -->
    <section class="copa-section" id="copa-eliminatoria-section">
        <div class="copa-section-header">
            <span class="copa-section-icon"><span class="material-icons">military_tech</span></span>
            <h2 class="copa-section-title">Fase Eliminatória</h2>
        </div>
        <div id="copa-eliminatoria-timeline" class="copa-timeline">
            <!-- Preenchido via JS -->
        </div>
    </section>

    <!-- Bottom padding para bottom nav -->
    <div class="pb-24"></div>
</div>

<link rel="stylesheet" href="/participante/css/copa-mundo-2026.css">
