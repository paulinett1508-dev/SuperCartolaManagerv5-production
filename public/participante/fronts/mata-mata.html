    .mm-pts-valor.vencedor {
        color: var(--mm-success);
    }
    .mm-pts-valor.perdedor {
        color: var(--mm-danger);
    }
    .mm-pts-valor.empate {
        color: var(--mm-warning);
    }

    .mm-col-time-r {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        min-width: 0;
        text-align: right;
    }

    .mm-col-time-r .mm-time-dados {
        align-items: flex-end;
    }

    .mm-col-dif {
        text-align: center;
        font-size: 11px;
        font-weight: 700;
        color: var(--mm-success);
    }

    /* ===== LOADING E VAZIO ===== */
    .mm-loading {
        text-align: center;
        padding: 40px 20px;
    }

    .mm-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 106, 56, 0.2);
        border-top-color: var(--participante-primary, #ff6a38);
        border-radius: 50%;
        animation: mm-spin 0.8s linear infinite;
        margin: 0 auto 12px;
    }

    @keyframes mm-spin {
        to {
            transform: rotate(360deg);
        }
    }

    .mm-loading p {
        color: var(--participante-text-muted, #9ca3af);
        font-size: 12px;
        margin: 0;
    }

    .mm-vazio {
        text-align: center;
        padding: 40px 20px;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 10px;
        border: 1px dashed rgba(255, 255, 255, 0.1);
    }

    .mm-vazio .material-symbols-outlined {
        font-size: 40px;
        color: var(--participante-text-muted, #6b7280);
        margin-bottom: 12px;
    }

    .mm-vazio h3 {
        color: var(--participante-text, #f9fafb);
        font-size: 14px;
        margin: 0 0 6px 0;
    }

    .mm-vazio p {
        color: var(--participante-text-muted, #9ca3af);
        font-size: 12px;
        margin: 0;
    }

    .mm-vazio-sub {
        margin-top: 8px !important;
        font-size: 11px !important;
        opacity: 0.7;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .mm-tabela-header,
        .mm-linha {
            grid-template-columns: 22px 1fr 46px 46px 1fr 38px;
        }

        .mm-tabela-header > div,
        .mm-linha > div {
            padding: 8px 4px;
        }

        .mm-escudo {
            width: 20px;
            height: 20px;
        }

        .mm-time-nome {
            font-size: 10px;
        }

        .mm-cartoleiro {
            display: none;
        }

        .mm-pts-valor {
            font-size: 10px;
        }

        .mm-mc-nome {
            font-size: 11px;
        }

        .mm-mc-pts {
            font-size: 16px;
        }

        .mm-mc-escudo {
            width: 28px;
            height: 28px;
        }
    }

    /* =====================================================
       NOVO LAYOUT v6.4 - Cards de Confronto
       ===================================================== */

    /* Card "Seu Confronto" - novo layout */
    .mm-meu-confronto-card {
        background: linear-gradient(
            135deg,
            rgba(255, 106, 56, 0.08) 0%,
            rgba(0, 0, 0, 0.5) 100%
        );
        border: 1px solid rgba(255, 106, 56, 0.25);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
    }

    .mm-mc-header-card {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
    }

    .mm-mc-header-card .mm-mc-icon {
        font-size: 20px;
    }

    .mm-mc-header-card .mm-mc-icon.passando {
        color: var(--mm-success);
    }
    .mm-mc-header-card .mm-mc-icon.sendo-eliminado {
        color: var(--mm-danger);
    }
    .mm-mc-header-card .mm-mc-icon.empatando {
        color: var(--mm-warning);
    }

    .mm-mc-header-card .mm-mc-titulo {
        font-size: 13px;
        font-weight: 700;
        color: var(--mm-text-white);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Versus layout */
    .mm-mc-versus {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .mm-mc-time-card {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        padding: 12px;
    }

    .mm-mc-time-card.eu {
        border-left: 3px solid var(--participante-primary, #ff6a38);
    }

    .mm-mc-time-card.adv {
        border-left: 3px solid var(--mm-text-dim);
    }

    .mm-mc-escudo-card {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.05);
        flex-shrink: 0;
    }

    .mm-mc-time-info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .mm-mc-time-info .mm-mc-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--participante-text-muted, #9ca3af);
        text-transform: uppercase;
    }

    .mm-mc-time-info .mm-mc-nome {
        font-size: 13px;
        font-weight: 700;
        color: var(--mm-text-white);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .mm-mc-time-card .mm-mc-pts {
        font-size: 20px;
        font-weight: 800;
        min-width: 70px;
        text-align: right;
    }

    .mm-mc-x {
        text-align: center;
        font-size: 12px;
        font-weight: 700;
        color: var(--participante-text-muted, #6b7280);
        padding: 4px 0;
    }

    /* Status card */
    .mm-mc-status-card {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 8px;
        margin-top: 14px;
        font-weight: 600;
        font-size: 12px;
    }

    .mm-mc-status-card.passando {
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: var(--mm-success);
    }

    .mm-mc-status-card.sendo-eliminado {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--mm-danger);
    }

    .mm-mc-status-card.empatando {
        background: rgba(234, 179, 8, 0.15);
        border: 1px solid rgba(234, 179, 8, 0.3);
        color: var(--mm-warning);
    }

    .mm-mc-status-card .material-symbols-outlined {
        font-size: 18px;
    }

    /* =====================================================
       LISTA DE CONFRONTOS - Cards
       ===================================================== */
    .mm-confrontos-lista {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .mm-confronto-card {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--participante-border, #3a3a3c);
        border-radius: 10px;
        padding: 12px;
        position: relative;
    }

    .mm-confronto-card.minha {
        background: rgba(255, 106, 56, 0.08);
        border-color: rgba(255, 106, 56, 0.3);
    }

    .mm-conf-numero {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 20px;
        height: 20px;
        background: var(--participante-primary, #ff6a38);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        color: var(--mm-bg-dark);
    }

    .mm-conf-times {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-left: 28px;
    }

    .mm-conf-time {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.02);
    }

    .mm-conf-time.vencedor {
        background: rgba(34, 197, 94, 0.1);
    }

    .mm-conf-time.perdedor {
        background: rgba(239, 68, 68, 0.05);
        opacity: 0.7;
    }

    .mm-conf-escudo {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.05);
        flex-shrink: 0;
    }

    .mm-conf-info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
    }

    .mm-conf-nome {
        font-size: 12px;
        font-weight: 700;
        color: var(--mm-text-white);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .mm-conf-cartola {
        font-size: 10px;
        color: var(--participante-text-muted, #9ca3af);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .mm-conf-pts {
        font-size: 14px;
        font-weight: 800;
        min-width: 55px;
        text-align: right;
    }

    .mm-conf-pts.vencedor {
        color: var(--mm-success);
    }
    .mm-conf-pts.perdedor {
        color: var(--mm-danger);
    }
    .mm-conf-pts.empate {
        color: var(--mm-warning);
    }

    .mm-conf-vs {
        text-align: center;
        font-size: 11px;
        font-weight: 600;
        color: var(--participante-text-muted, #6b7280);
        padding: 2px 0;
    }

    .mm-conf-diff {
        text-align: center;
        font-size: 10px;
        color: var(--mm-success);
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px dashed rgba(255, 255, 255, 0.1);
    }

    /* Separador "Outros Confrontos" */
    .mm-outros-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 20px 0 12px;
    }

    .mm-outros-header::before,
    .mm-outros-header::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--participante-border, #3a3a3c);
    }

    .mm-outros-header span {
        font-size: 11px;
        font-weight: 600;
        color: var(--participante-text-muted, #9ca3af);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
    }

    /* Card de eliminação - DISCRETO */
    .mm-eliminado-card {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: rgba(239, 68, 68, 0.06);
        border: 1px solid rgba(239, 68, 68, 0.15);
        border-radius: 8px;
        padding: 10px 16px;
        margin-bottom: 16px;
    }

    .mm-eliminado-card .material-symbols-outlined {
        font-size: 18px;
        color: var(--mm-danger);
    }

    .mm-eliminado-card .mm-elim-texto {
        display: flex;
        flex-direction: column;
        gap: 1px;
    }

    .mm-eliminado-card .mm-elim-titulo {
        font-size: 12px;
        font-weight: 600;
        color: var(--mm-danger);
        margin: 0;
    }

    .mm-eliminado-card .mm-elim-fase {
        font-size: 10px;
        color: var(--participante-text-muted, #9ca3af);
        margin: 0;
    }

    /* =====================================================
       CARD DO CAMPEÃO - Destaque especial na FINAL
       ===================================================== */
    .mm-campeao-card {
        background: linear-gradient(
            135deg,
            rgba(234, 179, 8, 0.15) 0%,
            rgba(234, 179, 8, 0.05) 100%
        );
        border: 2px solid rgba(234, 179, 8, 0.4);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .mm-campeao-card::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
            circle,
            rgba(234, 179, 8, 0.1) 0%,
            transparent 60%
        );
        animation: mm-shine 3s ease-in-out infinite;
    }

    @keyframes mm-shine {
        0%,
        100% {
            transform: rotate(0deg);
        }
        50% {
            transform: rotate(180deg);
        }
    }

    .mm-campeao-trofeu {
        font-size: 48px;
        margin-bottom: 8px;
        position: relative;
        z-index: 1;
        animation: mm-bounce 2s ease-in-out infinite;
    }

    @keyframes mm-bounce {
        0%,
        100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-5px);
        }
    }

    .mm-campeao-titulo {
        font-family: var(--mm-font-brand);
        font-size: 11px;
        font-weight: 400;
        color: var(--mm-warning);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin: 0 0 12px 0;
        position: relative;
        z-index: 1;
    }

    .mm-campeao-time {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 12px;
        padding: 14px 20px;
        position: relative;
        z-index: 1;
    }

    .mm-campeao-escudo {
        width: 56px;
        height: 56px;
        border-radius: 10px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(234, 179, 8, 0.3);
    }

    .mm-campeao-info {
        text-align: left;
    }

    .mm-campeao-nome {
        font-family: var(--mm-font-brand);
        font-size: 16px;
        font-weight: 400;
        letter-spacing: 0.3px;
        color: var(--mm-text-white);
        margin: 0 0 2px 0;
    }

    .mm-campeao-cartola {
        font-size: 12px;
        color: var(--participante-text-muted, #9ca3af);
        margin: 0 0 6px 0;
    }

    .mm-campeao-pts {
        font-family: var(--mm-font-brand);
        font-size: 20px;
        font-weight: 400;
        letter-spacing: -0.3px;
        color: var(--mm-warning);
        margin: 0;
    }

    .mm-campeao-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: linear-gradient(135deg, var(--mm-warning), var(--mm-warning-dark));
        color: var(--mm-bg-dark);
        font-family: var(--mm-font-brand);
        font-size: 10px;
        font-weight: 400;
        padding: 6px 14px;
        border-radius: 20px;
        margin-top: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        position: relative;
        z-index: 1;
    }

    .mm-campeao-badge .material-symbols-outlined {
        font-size: 14px;
    }

    /* Campeão SOU EU - destaque extra */
    .mm-campeao-card.sou-eu {
        border-color: rgba(34, 197, 94, 0.5);
        background: linear-gradient(
            135deg,
            rgba(34, 197, 94, 0.15) 0%,
            rgba(234, 179, 8, 0.1) 100%
        );
    }

    .mm-campeao-card.sou-eu .mm-campeao-titulo {
        color: var(--mm-success);
    }

    .mm-campeao-card.sou-eu .mm-campeao-badge {
        background: linear-gradient(135deg, var(--mm-success), var(--mm-success-dark));
    }

    /* Responsive para novos cards */
    @media (max-width: 400px) {
        .mm-mc-escudo-card {
            width: 40px;
            height: 40px;
        }

        .mm-mc-time-card .mm-mc-pts {
            font-size: 16px;
            min-width: 60px;
        }

        .mm-conf-escudo {
            width: 28px;
            height: 28px;
        }

        .mm-conf-nome {
            font-size: 11px;
        }

        .mm-conf-pts {
            font-size: 12px;
            min-width: 48px;
        }
    }

    /* =====================================================
       CARD "SEU DESEMPENHO" - VERSÃO 2
       ===================================================== */
    .mm-desempenho-card {
        background: rgba(26, 26, 26, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-left: 4px solid var(--mm-primary);
        border-radius: 10px;
        padding: 14px 16px;
        margin-top: 20px;
    }

    .mm-desemp-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
    }

    .mm-desemp-header .material-symbols-outlined {
        color: var(--mm-primary);
        font-size: 18px;
    }

    .mm-desemp-header span:not(.material-symbols-outlined) {
        font-size: 12px;
        font-weight: 600;
        color: var(--mm-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .mm-desemp-main-stats {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
    }

    .mm-desemp-main-stat {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 8px;
    }

    .mm-desemp-main-icon {
        font-size: 28px;
    }

    .mm-desemp-main-icon.win {
        color: var(--mm-success);
    }

    .mm-desemp-main-icon.loss {
        color: var(--mm-danger);
    }

    .mm-desemp-main-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .mm-desemp-main-label {
        font-size: 9px;
        color: var(--mm-text-dim);
        text-transform: uppercase;
    }

    .mm-desemp-main-value {
        font-family: var(--mm-font-brand);
        font-size: 20px;
        font-weight: 400;
        letter-spacing: -0.3px;
        color: var(--mm-text-white);
        line-height: 1;
    }

    .mm-desemp-secondary-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 12px;
    }

    .mm-desemp-secondary-stat {
        text-align: center;
        padding: 8px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 6px;
    }

    .mm-desemp-secondary-value {
        font-family: var(--mm-font-brand);
        font-size: 14px;
        font-weight: 400;
        color: var(--mm-text-white);
        line-height: 1;
    }

    .mm-desemp-secondary-label {
        font-size: 9px;
        color: var(--mm-text-dim);
        margin-top: 4px;
        text-transform: uppercase;
    }

    .mm-desemp-secondary-value.highlight {
        color: var(--mm-primary);
    }

    .mm-desemp-secondary-value.success {
        color: var(--mm-success);
    }

    /* Histórico de edições */
    .mm-desemp-history {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 12px;
    }

    .mm-desemp-history-title {
        font-size: 10px;
        font-weight: 600;
        color: var(--mm-text-dim);
        text-transform: uppercase;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .mm-desemp-history-title .material-symbols-outlined {
        font-size: 14px;
    }

    .mm-desemp-edition-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .mm-desemp-edition-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 6px;
        font-size: 11px;
    }

    .mm-desemp-edition-name {
        color: var(--mm-text-muted);
        font-weight: 600;
    }

    .mm-desemp-edition-stats {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .mm-desemp-edition-record {
        color: var(--mm-text-dim);
        font-size: 10px;
    }

    .mm-desemp-edition-phase {
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
    }

    .mm-desemp-edition-phase.campeao {
        background: rgba(234, 179, 8, 0.2);
        color: var(--mm-warning);
    }

    .mm-desemp-edition-phase.semis {
        background: rgba(59, 130, 246, 0.2);
        color: var(--mm-info);
    }

    .mm-desemp-edition-phase.quartas {
        background: rgba(139, 92, 246, 0.2);
        color: var(--mm-purple);
    }

    .mm-desemp-edition-phase.oitavas {
        background: rgba(236, 72, 153, 0.2);
        color: var(--mm-pink);
    }

    .mm-desemp-edition-phase.primeira {
        background: rgba(107, 114, 128, 0.2);
        color: var(--mm-text-muted);
    }

    /* =====================================================
       PARCIAIS AO VIVO - v7.2
       ===================================================== */

    .mm-parciais-menu { text-align: center; }

    .mm-parciais-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 16px;
        padding: 0 8px;
    }

    .mm-parciais-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        color: var(--mm-text);
        font-family: var(--mm-font-body);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
    }

    .mm-parciais-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(245, 158, 11, 0.4);
    }

    .mm-parciais-btn .material-symbols-outlined {
        font-size: 18px;
        color: var(--app-amber);
    }

    .mm-parciais-badge {
        margin-left: auto;
        background: linear-gradient(135deg, var(--app-amber), #d97706);
        color: #000;
        font-size: 9px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 4px;
        letter-spacing: 0.5px;
