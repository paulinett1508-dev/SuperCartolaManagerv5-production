# ===========================
# Deploy Staging - Super Cartola Manager
# ===========================
# Trigger: Push para branch develop
# Destino: VPS Hostinger (container scm-staging)

name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Deploy to Staging VPS
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/super-cartola-manager
            git pull origin develop
            docker compose build scm-staging
            docker compose up -d scm-staging
            echo "Staging deployed at $(date)"
            docker logs --tail 20 scm-staging
