# ===========================
# Super Cartola Manager
# Docker Compose - Staging + Produção
# ===========================
# Uso:
#   Staging:  docker compose up -d scm-staging
#   Produção: docker compose up -d scm-prod
#   Ambos:    docker compose up -d
#   Logs:     docker compose logs -f scm-prod
#   Rebuild:  docker compose build --no-cache

services:
  scm-staging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scm-staging
    env_file: .env.staging
    ports:
      - "3001:3000"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  scm-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scm-prod
    env_file: .env.prod
    ports:
      - "5000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  scm-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: scm-mcp
    env_file: .env.prod
    ports:
      - "127.0.0.1:3099:3099"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
